<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proje Sınıflandırma Soru Seti</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f5f5;color:#2c2c2a;line-height:1.6}
.wrap{max-width:800px;margin:0 auto;padding:20px}
h1{font-size:22px;font-weight:600;color:#1B3A5C;margin-bottom:4px}
.sub{font-size:13px;color:#888;margin-bottom:20px}
.sticky{position:sticky;top:0;z-index:10;background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:16px 18px;margin-bottom:20px;box-shadow:0 2px 12px rgba(0,0,0,.08)}
.sticky-top{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:12px}
.score-block{display:flex;gap:16px;align-items:center}
.score-num{font-size:28px;font-weight:600}
.score-label{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.5px}
.divider{width:1px;height:36px;background:#e0e0e0}
.badge{display:inline-block;padding:3px 12px;border-radius:20px;font-size:14px;font-weight:600}
.tag-counts{display:flex;gap:12px}
.tag-count{text-align:center;min-width:50px}
.tag-count .num{font-size:20px;font-weight:600}
.tag-count .lbl{font-size:10px;color:#888}
.matrix-wrap{position:relative;width:100%;aspect-ratio:1.6/1;min-height:240px;background:#fff;border-radius:10px;border:1px solid #e8e8e8;overflow:hidden;margin-bottom:10px}
.zone{position:absolute;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:2px}
.zone-label{font-size:11px;font-weight:700;letter-spacing:.5px;opacity:.55}
.zone-sub{font-size:9px;opacity:.35;text-align:center;max-width:90%}
.axis-label{position:absolute;font-size:10px;font-weight:600;color:#888;letter-spacing:.5px}
.dot{position:absolute;width:20px;height:20px;border-radius:50%;border:3px solid #fff;box-shadow:0 2px 10px rgba(0,0,0,.3);transition:left .5s cubic-bezier(.4,0,.2,1),top .5s cubic-bezier(.4,0,.2,1),background .3s;z-index:5}
.dot-label{position:absolute;font-size:11px;font-weight:600;color:#1B3A5C;white-space:nowrap;transition:left .5s cubic-bezier(.4,0,.2,1),top .5s cubic-bezier(.4,0,.2,1);z-index:5;background:rgba(255,255,255,.9);padding:2px 8px;border-radius:4px;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.crosshair-h,.crosshair-v{position:absolute;transition:left .5s cubic-bezier(.4,0,.2,1),top .5s cubic-bezier(.4,0,.2,1);z-index:3}
.crosshair-h{height:1px;left:0;right:0;background:rgba(0,0,0,.1)}
.crosshair-v{width:1px;top:0;bottom:0;background:rgba(0,0,0,.1)}
.innovation-pills{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);display:flex;gap:3px;z-index:4}
.inno-pill{font-size:7px;padding:2px 5px;border-radius:3px;font-weight:600;opacity:.7}
.result-desc{padding:10px 14px;border-radius:8px;font-size:13px;line-height:1.5;margin-bottom:8px}
.warn-box{padding:8px 14px;border-radius:8px;font-size:12px;line-height:1.5;margin-bottom:8px;border:1px dashed}
.progress-bar{height:4px;background:#e0e0e0;border-radius:2px;overflow:hidden}
.progress-fill{height:4px;border-radius:2px;transition:width .3s}
.progress-text{font-size:11px;color:#999;margin-top:4px}
.q-card{border:1px solid #e0e0e0;border-radius:12px;padding:16px;margin-bottom:14px;background:#fff;transition:background .2s}
.q-card.answered{background:#fafafa}
.q-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;flex-wrap:wrap;gap:6px}
.q-header-left{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.q-num{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;font-size:12px;font-weight:600;color:#fff;background:#b0b0b0;transition:background .2s}
.q-num.active{background:#2E75B6}
.q-dim{font-size:11px;color:#888;border:1px solid #e0e0e0;padding:1px 8px;border-radius:4px}
.q-weight{font-size:11px;color:#888}
.q-src{font-size:10px;color:#aaa;font-style:italic}
.q-text{font-size:14px;font-weight:600;color:#1B3A5C;margin:8px 0 12px;line-height:1.5}
.opt-btn{display:flex;align-items:center;gap:10px;width:100%;padding:9px 14px;border:1px solid #e0e0e0;border-radius:8px;background:#fff;cursor:pointer;text-align:left;font-size:13px;color:#2c2c2a;line-height:1.4;margin-bottom:5px;transition:all .15s}
.opt-btn:hover{background:#f8f8f8}
.opt-btn.sel{border-width:2px}
.radio{flex-shrink:0;width:18px;height:18px;border-radius:50%;border:2px solid #ccc;display:flex;align-items:center;justify-content:center;transition:border-color .15s}
.radio .rdot{width:8px;height:8px;border-radius:50%;display:none}
.opt-btn.sel .radio .rdot{display:block}
.opt-label{flex:1}
.opt-tag{flex-shrink:0;font-size:10px;padding:2px 7px;border-radius:4px;font-weight:600}
.reset-btn{display:block;margin:16px auto;padding:8px 24px;border-radius:8px;border:1px solid #ccc;background:#fff;color:#888;cursor:pointer;font-size:13px}
.reset-btn:hover{background:#f0f0f0}
.footer{margin-top:20px;padding:12px 16px;background:#f0f0f0;border-radius:8px;font-size:11px;color:#888;line-height:1.7}
.footer strong{color:#666}
.grid-line{position:absolute;background:rgba(0,0,0,.04)}
.grid-line-h{height:1px;left:0;right:0}
.grid-line-v{width:1px;top:0;bottom:0}
.tick{position:absolute;font-size:8px;color:#bbb;font-weight:500}
@media(max-width:600px){.sticky-top{flex-direction:column;align-items:flex-start}.tag-counts{margin-top:8px}.matrix-wrap{aspect-ratio:1.4/1;min-height:200px}}
@media print{.sticky{position:relative}.wrap{max-width:100%}body{background:#fff}}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<script>
const questions=[
{id:1,dim:"Stratejik Hizalanma",src:"Gartner RGT",w:20,q:"Bu proje şirketin stratejik hedefleriyle nasıl ilişkileniyor?",opts:[
{s:1,l:"Tamamen operasyonel devamlılık — stratejik hedefle bağlantısı yok",t:"RTB"},
{s:2,l:"Dolaylı stratejik destek — genel verimlilik artışı sağlıyor",t:"RTB"},
{s:3,l:"Mevcut stratejik hedeflerin ölçeklendirilmesine katkı sağlıyor",t:"Grow"},
{s:5,l:"Yeni bir stratejik yön veya iş modeli oluşturuyor",t:"Transform"}]},
{id:2,dim:"Değer Önermesi",src:"Gartner RGT / HSBC",w:15,q:"Projenin yarattığı değerin doğası nedir?",opts:[
{s:1,l:"Mevcut değeri koruma — yapılmazsa iş aksayacak (KTLO)",t:"RTB"},
{s:2,l:"Risk azaltma veya uyumluluk sağlama (yasal, güvenlik)",t:"RTB"},
{s:3,l:"Mevcut gelir/verimliliği artırma — aynı müşteri, aynı pazar",t:"Grow"},
{s:4,l:"Mevcut müşterilere yeni ürün/hizmet sunma",t:"Grow"},
{s:5,l:"Tamamen yeni gelir kaynağı, pazar veya müşteri segmenti yaratma",t:"Transform"}]},
{id:3,dim:"Hedef Pazar ve Müşteri",src:"Gartner Grow vs Transform",w:12,q:"Proje hangi müşteri segmentine ve pazara yönelik?",opts:[
{s:1,l:"İç kullanıcılar / operasyonel ekipler (müşteriyle doğrudan ilişki yok)",t:"RTB"},
{s:2,l:"Mevcut müşteri tabanı — mevcut hizmet kanalları üzerinden",t:"RTB"},
{s:3,l:"Mevcut müşteri tabanı — genişletilmiş/iyileştirilmiş kanallar",t:"Grow"},
{s:4,l:"Mevcut müşteri tabanı — tamamen yeni bir temas noktası/kanal",t:"Grow"},
{s:5,l:"Yeni müşteri segmenti veya henüz girilmemiş pazar",t:"Transform"}]},
{id:4,dim:"Teknoloji Olgunluğu",src:"Cisco Rapid Risk / Gartner",w:10,q:"Projede kullanılacak teknolojinin olgunluk seviyesi nedir?",opts:[
{s:1,l:"Kanıtlanmış teknoloji — şirkette daha önce başarıyla uygulanmış",t:"RTB"},
{s:2,l:"Bilinen teknoloji — sektörde yaygın ancak şirkette ilk kez",t:"RTB"},
{s:3,l:"Olgunlaşmakta olan teknoloji — referans uygulamalar mevcut",t:"Grow"},
{s:4,l:"Yeni nesil teknoloji — sınırlı referans, POC gerekli",t:"Transform"},
{s:5,l:"Deneysel teknoloji — henüz endüstride yaygın kanıtı yok",t:"Transform"}]},
{id:5,dim:"Organizasyonel Etki Kapsamı",src:"Info-Tech / iPMO Modeli",w:10,q:"Proje organizasyonda kaç birimi/departmanı etkiliyor?",opts:[
{s:1,l:"Tek bir ekip veya fonksiyon içi — sınırlı etki",t:"RTB"},
{s:2,l:"Tek bir departman/bölüm — orta düzey etki",t:"RTB"},
{s:3,l:"2–3 departman — çapraz fonksiyonel koordinasyon gerekli",t:"Grow"},
{s:4,l:"Şirket geneli — çoğu departmanı etkiliyor",t:"Transform"},
{s:5,l:"Şirket + dış paydaşlar (bayiler, OEM, müşteriler)",t:"Transform"}]},
{id:6,dim:"İş Modeli Etkisi",src:"HSBC CTB / Endeavor Mgmt",w:15,q:"Proje mevcut iş modelini nasıl etkiliyor?",opts:[
{s:1,l:"İş modelinde değişiklik yok — mevcut süreçlerin bakımı",t:"RTB"},
{s:2,l:"Mevcut süreçlerde küçük iyileştirme — temel akış aynı",t:"RTB"},
{s:3,l:"Mevcut iş modelinin verimliliğini/kapasitesini artırma",t:"Grow"},
{s:4,l:"Mevcut iş modeline yeni bir bileşen/kanal ekleme",t:"Grow"},
{s:5,l:"Tamamen yeni bir iş modeli veya gelir mekanizması yaratma",t:"Transform"}]},
{id:7,dim:"Belirsizlik ve Risk Seviyesi",src:"Gartner Transform ~%66 başarısızlık",w:8,q:"Projenin sonuçlarına ilişkin belirsizlik seviyesi nedir?",opts:[
{s:1,l:"Sonuç öngörülebilir — benzer projeler başarıyla tamamlanmış",t:"RTB"},
{s:2,l:"Düşük belirsizlik — kapsam net, riskler yönetilebilir",t:"RTB"},
{s:3,l:"Orta belirsizlik — bazı varsayımlar doğrulanmaya muhtaç",t:"Grow"},
{s:4,l:"Yüksek belirsizlik — hipotez doğrulama (keşif) aşaması şart",t:"Transform"},
{s:5,l:"Çok yüksek belirsizlik — birden fazla bilinmeyen, pivot olasılığı",t:"Transform"}]},
{id:8,dim:"Başarı Ölçüm Yaklaşımı",src:"Execution Excellence Manifesto",w:5,q:"Projenin başarısı nasıl ölçülecek?",opts:[
{s:1,l:"SLA karşılama, uptime, hata sayısı — süreç akışı metrikleri",t:"RTB"},
{s:2,l:"Maliyet tasarrufu veya risk azaltma miktarı (EUR)",t:"RTB"},
{s:3,l:"Gelir artışı, cross-sell oranı — gecikmeli (lagging) göstergeler",t:"Grow"},
{s:4,l:"Kullanıcı benimseme, NPS — öncü (leading) göstergeler",t:"Transform"},
{s:5,l:"Hipotez doğrulama oranı + kill criteria (Go/No-Go)",t:"Transform"}]},
{id:9,dim:"Bütçeleme Modeli",src:"Gartner Stage-Gate",w:5,q:"Proje için en uygun bütçeleme yaklaşımı hangisi?",opts:[
{s:1,l:"Yıllık operasyonel bütçe içinde — ayrı onay gerekmez (İç kaynak ve şirkete tahsis edilmiş dış kaynak)",t:"RTB"},
{s:2,l:"Sabit bütçe — kapsam ve maliyet baştan belirli (3. kaynak çözümler)",t:"RTB"},
{s:3,l:"Proje bazlı bütçe — business case onayı sonrası tahsis",t:"Grow"},
{s:4,l:"Aşama bazlı (stage-gate) — her faz için ayrı onay",t:"Transform"},
{s:5,l:"Discovery fonlaması — küçük başlangıç, pivot/kill opsiyonu",t:"Transform"}]},
{id:10,dim:"Düzenleyici / Uyumluluk",src:"TBM / ITFM",w:0,q:"Projenin düzenleyici veya yasal uyumluluk boyutu var mı? (Ağırlıksız — sınıflandırma düzeltici)",opts:[
{s:-2,l:"Evet — yasal zorunluluk veya düzenleyici son tarih (RTB'ye çeker)",t:"RTB"},
{s:0,l:"Hayır — düzenleyici boyutu yok",t:"—"}]}
];

const answers={};
const tagColors={RTB:"#548235",Grow:"#C55A11",Transform:"#7030A0"};
const tagBg={RTB:"#EAF3DE",Grow:"#FAEEDA",Transform:"#EEEDFE"};

function countTags(){
  const c={RTB:0,Grow:0,Transform:0};
  questions.forEach(q=>{if(answers[q.id]!==undefined){const o=q.opts.find(o=>o.s===answers[q.id]);if(o&&o.t&&c[o.t]!==undefined)c[o.t]++;}});
  return c;
}

function classify(ws,q5,q10,tags){
  let adj=ws+(q10||0);
  
  // Tag majority cross-check: if one tag has 70%+ of weighted answers,
  // it acts as a guardrail against score anomalies
  const totalTagged=tags.RTB+tags.Grow+tags.Transform;
  const majorityThreshold=0.65;
  
  // If score says Transform but Grow dominates tags → cap at Grow
  if(adj>3.40 && totalTagged>0 && (tags.Grow/totalTagged)>=majorityThreshold && tags.Transform<=2){
    adj=Math.min(adj,3.40);
  }
  // If score says Grow but RTB dominates tags → cap at RTB range
  if(adj>2.60 && totalTagged>0 && (tags.RTB/totalTagged)>=majorityThreshold && tags.Grow<=1){
    adj=Math.min(adj,2.60);
  }
  
  if(adj<=2.0){
    if((q5||1)<=2)return{cls:"RTB-1",color:tagColors.RTB,bg:tagBg.RTB,label:"RTB-1 (Rutin)",desc:"Günlük operasyonel bakım. Kanban ile yönetilebilir. Doğrudan portföye alınır.",adj:adj};
    return{cls:"RTB-2",color:tagColors.RTB,bg:tagBg.RTB,label:"RTB-2 (Birim İçi)",desc:"Tek birimi etkileyen orta ölçekli iyileştirme. Doğrudan portföye alınır.",adj:adj};
  }
  if(adj<=2.6){
    if((q5||1)>=3)return{cls:"RTB-3",color:"#C00000",bg:"#FCEBEB",label:"RTB-3 (Çoklu Birim)",desc:"Çoklu birim etkisi. G3 mini fizibilite gerekir.",adj:adj};
    return{cls:"RTB-2",color:tagColors.RTB,bg:tagBg.RTB,label:"RTB-2 (Birim İçi)",desc:"Tek birimi etkileyen orta ölçekli iyileştirme.",adj:adj};
  }
  if(adj<=3.4)return{cls:"CTB-Grow",color:tagColors.Grow,bg:tagBg.Grow,label:"CTB-Grow",desc:"Mevcut pazarda büyüme. Agile/Scrum, proje bazlı bütçeleme. G3 fizibilite şart.",adj:adj};
  return{cls:"CTB-Transform",color:tagColors.Transform,bg:tagBg.Transform,label:"CTB-Transform",desc:"Stratejik dönüşüm. Keşif → MVP → Ölçekleme, stage-gate fonlama, kill criteria. G3 zorunlu.",adj:adj};
}

function compute(){
  const scored=questions.filter(q=>q.w>0&&answers[q.id]!==undefined);
  if(!scored.length)return null;
  const wSum=scored.reduce((s,q)=>s+answers[q.id]*q.w,0);
  const wTot=scored.reduce((s,q)=>s+q.w,0);
  const ws=wSum/wTot;
  const tags=countTags();
  const cls=classify(ws,answers[5],answers[10],tags);
  return{score:ws,cls:cls,answered:scored.length,total:questions.filter(q=>q.w>0).length,rawScore:ws,adjScore:cls.adj};
}

function computeAxes(){
  const xQs=[6,2,3],yQs=[1,4,7];
  let xSum=0,xCnt=0,ySum=0,yCnt=0;
  xQs.forEach(id=>{if(answers[id]!==undefined){xSum+=answers[id];xCnt++;}});
  yQs.forEach(id=>{if(answers[id]!==undefined){ySum+=answers[id];yCnt++;}});
  return{x:xCnt?xSum/xCnt:null,y:yCnt?ySum/yCnt:null};
}

function getInnovationTypes(){
  const scored=questions.filter(q=>q.w>0&&answers[q.id]!==undefined);
  if(!scored.length)return[];
  const avg=scored.reduce((s,q)=>s+answers[q.id],0)/scored.length;
  const all=["Product Performance","Profit Model","Network","Structure","Process","Product System","Channel","Brand","Customer Engagement","Service"];
  if(avg<=2)return all.slice(0,2);
  if(avg<=3.4)return all.slice(0,4);
  return all.slice(0,6);
}

function renderMatrix(res){
  const axes=computeAxes();
  const hasData=axes.x!==null||axes.y!==null;
  const xNorm=axes.x!==null?((axes.x-1)/4):0.15;
  const yNorm=axes.y!==null?((axes.y-1)/4):0.15;
  const dotColor=res?res.cls.color:"#999";
  const innoTypes=getInnovationTypes();

  // Zone boundaries aligned with score thresholds:
  // 1.0-2.3 = Core (RTB), 2.3-3.7 = Adjacent (Grow), 3.7-5.0 = Transform
  // Normalized: 0-32.5% = Core, 32.5-67.5% = Adjacent, 67.5-100% = Transform
  const zLow=32.5, zHigh=67.5;

  let h=`<div class="matrix-wrap"><div class="matrix-bg">`;

  // Zone backgrounds — 3x3 grid
  // Bottom-left: Core
  h+=`<div class="zone" style="left:0;top:${zHigh}%;width:${zLow}%;height:${100-zHigh}%;background:#E0ECDA"><span class="zone-label" style="color:#548235">CORE</span><span class="zone-sub" style="color:#548235">RTB-1 / RTB-2</span></div>`;
  // Bottom-mid: RTB-3 transition
  h+=`<div class="zone" style="left:${zLow}%;top:${zHigh}%;width:${zHigh-zLow}%;height:${100-zHigh}%;background:#ECF2E6"><span class="zone-sub" style="color:#548235">RTB-3</span></div>`;
  // Bottom-right
  h+=`<div class="zone" style="left:${zHigh}%;top:${zHigh}%;width:${100-zHigh}%;height:${100-zHigh}%;background:#F5F0E8"><span class="zone-sub" style="color:#C55A11;opacity:.3">geçiş</span></div>`;
  // Mid-left
  h+=`<div class="zone" style="left:0;top:${100-zHigh}%;width:${zLow}%;height:${zHigh-zLow}%;background:#F5F0E8"><span class="zone-sub" style="color:#C55A11;opacity:.3">geçiş</span></div>`;
  // Mid-mid: Adjacent (Grow)
  h+=`<div class="zone" style="left:${zLow}%;top:${100-zHigh}%;width:${zHigh-zLow}%;height:${zHigh-zLow}%;background:#FAEEDA"><span class="zone-label" style="color:#C55A11">ADJACENT</span><span class="zone-sub" style="color:#C55A11">CTB-Grow</span></div>`;
  // Mid-right
  h+=`<div class="zone" style="left:${zHigh}%;top:${100-zHigh}%;width:${100-zHigh}%;height:${zHigh-zLow}%;background:#F3EDFA"><span class="zone-sub" style="color:#7030A0;opacity:.3">geçiş</span></div>`;
  // Top-left
  h+=`<div class="zone" style="left:0;top:0;width:${zLow}%;height:${100-zHigh}%;background:#F3EDFA"><span class="zone-sub" style="color:#7030A0;opacity:.3">geçiş</span></div>`;
  // Top-mid
  h+=`<div class="zone" style="left:${zLow}%;top:0;width:${zHigh-zLow}%;height:${100-zHigh}%;background:#F0EAFA"><span class="zone-sub" style="color:#7030A0;opacity:.3">geçiş</span></div>`;
  // Top-right: Transformational
  h+=`<div class="zone" style="left:${zHigh}%;top:0;width:${100-zHigh}%;height:${100-zHigh}%;background:#EEEDFE"><span class="zone-label" style="color:#7030A0">TRANSFORM</span><span class="zone-sub" style="color:#7030A0">CTB-Transform</span></div>`;

  // Grid lines at zone boundaries
  h+=`<div class="grid-line grid-line-h" style="top:${100-zHigh}%;background:rgba(0,0,0,.08)"></div>`;
  h+=`<div class="grid-line grid-line-h" style="top:${zHigh}%;background:rgba(0,0,0,.08)"></div>`;
  h+=`<div class="grid-line grid-line-v" style="left:${zLow}%;background:rgba(0,0,0,.08)"></div>`;
  h+=`<div class="grid-line grid-line-v" style="left:${zHigh}%;background:rgba(0,0,0,.08)"></div>`;

  // Axis labels
  h+=`<div class="axis-label" style="bottom:4px;left:50%;transform:translateX(-50%)">İş modeli değişim yoğunluğu (S2, S3, S6) →</div>`;
  h+=`<div class="axis-label" style="left:4px;top:50%;transform:rotate(-90deg) translateX(-50%);transform-origin:left center;white-space:nowrap">İnovasyon derinliği (S1, S4, S7) →</div>`;

  // Ticks
  for(let i=1;i<=5;i++){
    h+=`<div class="tick" style="bottom:2px;left:${((i-1)/4)*100}%;transform:translateX(-50%)">${i}</div>`;
    h+=`<div class="tick" style="left:2px;bottom:${((i-1)/4)*100}%;transform:translateY(50%)">${i}</div>`;
  }

  if(hasData){
    const dotLeft=`calc(${xNorm*100}% - 10px)`;
    const dotTop=`calc(${(1-yNorm)*100}% - 10px)`;
    h+=`<div class="crosshair-h" style="top:${(1-yNorm)*100}%"></div>`;
    h+=`<div class="crosshair-v" style="left:${xNorm*100}%"></div>`;
    h+=`<div class="dot" style="left:${dotLeft};top:${dotTop};background:${dotColor}"></div>`;
    h+=`<div class="dot-label" style="left:calc(${xNorm*100}% + 16px);top:calc(${(1-yNorm)*100}% - 12px)">${res?res.cls.label:"..."}</div>`;
  }else{
    h+=`<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:4"><span style="font-size:13px;color:#bbb;background:rgba(255,255,255,.8);padding:6px 16px;border-radius:8px">Soruları yanıtladıkça proje burada konumlanacak</span></div>`;
  }

  if(innoTypes.length>0){
    h+=`<div class="innovation-pills">`;
    const pillColors=["#2E75B6","#C55A11","#548235","#7030A0","#1B3A5C","#C00000"];
    innoTypes.forEach((t,i)=>{h+=`<span class="inno-pill" style="background:${pillColors[i%pillColors.length]}20;color:${pillColors[i%pillColors.length]}">${t}</span>`;});
    h+=`</div>`;
  }

  h+=`</div></div>`;
  h+=`<div style="display:flex;justify-content:space-between;font-size:10px;color:#aaa;margin-bottom:4px;padding:0 4px">
    <span>X: İş modeli değişimi</span><span>Y: İnovasyon derinliği</span>
    <span>Koordinat: (${axes.x!==null?axes.x.toFixed(1):"—"}, ${axes.y!==null?axes.y.toFixed(1):"—"})</span></div>`;

  return h;
}

function render(){
  const res=compute();
  const tags=countTags();
  const app=document.getElementById("app");

  let html=`<div style="display:flex;align-items:center;gap:12px;margin-bottom:8px">
    <div style="width:6px;height:32px;background:#2E75B6;border-radius:3px"></div>
    <div><h1>Proje sınıflandırma soru seti</h1>
    <p class="sub">Gartner RGT, HSBC RTB/CTB, Cisco Rapid Risk, Info-Tech, Execution Excellence, TBM/ITFM</p></div></div>`;

  html+=`<div class="sticky"><div class="sticky-top"><div class="score-block">`;
  if(res&&res.answered>0){
    const showAdj=res.rawScore!==res.adjScore;
    html+=`<div><div class="score-label">Ağırlıklı skor${showAdj?" (düzeltilmiş)":""}</div><div class="score-num" style="color:${res.cls.color}">${res.adjScore.toFixed(2)}</div>${showAdj?`<div style="font-size:10px;color:#aaa;text-decoration:line-through">${res.rawScore.toFixed(2)}</div>`:""}</div>
      <div class="divider"></div>
      <div><div class="score-label">Sınıflandırma</div><div class="badge" style="background:${res.cls.bg};color:${res.cls.color}">${res.cls.label}</div></div>`;
  }else{
    html+=`<div><div class="score-label">Ağırlıklı skor</div><div class="score-num" style="color:#ccc">—</div></div>
      <div class="divider"></div>
      <div><div class="score-label">Sınıflandırma</div><div class="badge" style="background:#f0f0f0;color:#999">Yanıt bekleniyor</div></div>`;
  }
  html+=`</div><div class="tag-counts">
    ${["RTB","Grow","Transform"].map(k=>`<div class="tag-count"><div class="num" style="color:${tagColors[k]}">${tags[k]}</div><div class="lbl">${k}</div></div>`).join("")}
  </div></div>`;

  html+=renderMatrix(res);

  // Tag-score mismatch warning
  if(res&&res.answered>=5){
    const total=tags.RTB+tags.Grow+tags.Transform;
    if(total>0){
      const growPct=tags.Grow/total;
      const rtbPct=tags.RTB/total;
      if(res.rawScore!==res.adjScore){
        const dominant=growPct>=0.65?"Grow":rtbPct>=0.65?"RTB":"";
        if(dominant){
          html+=`<div class="warn-box" style="background:#FFF8F0;border-color:#C55A11;color:#C55A11">
            <strong>Düzeltme uygulandı:</strong> Ham skor ${res.rawScore.toFixed(2)} idi ancak cevapların %${Math.round((dominant==="Grow"?growPct:rtbPct)*100)}'${dominant==="Grow"?"i":"ü"} ${dominant} yönelimli. Skor ${res.adjScore.toFixed(2)} olarak düzeltildi.
          </div>`;
        }
      }
    }
  }

  if(res&&res.answered>=9){
    html+=`<div class="result-desc" style="background:${res.cls.bg};color:${res.cls.color}">${res.cls.desc}</div>`;
  }

  if(res){
    html+=`<div class="progress-bar"><div class="progress-fill" style="width:${(res.answered/res.total)*100}%;background:#2E75B6"></div></div>
      <div class="progress-text">${res.answered}/${res.total} soru yanıtlandı</div>`;
  }else{
    html+=`<div class="progress-bar"><div class="progress-fill" style="width:0%;background:#2E75B6"></div></div>
      <div class="progress-text">0/9 soru yanıtlandı</div>`;
  }
  html+=`</div>`;

  questions.forEach((q,qi)=>{
    const ans=answers[q.id];
    html+=`<div class="q-card ${ans!==undefined?"answered":""}">
      <div class="q-header"><div class="q-header-left">
        <span class="q-num ${ans!==undefined?"active":""}">${qi+1}</span>
        <span class="q-dim">${q.dim}</span>
        ${q.w>0?`<span class="q-weight">ağırlık: %${q.w}</span>`:""}
      </div><span class="q-src">${q.src}</span></div>
      <div class="q-text">${q.q}</div>`;
    q.opts.forEach(opt=>{
      const sel=ans===opt.s;
      const tc=tagColors[opt.t]||"#999";
      html+=`<button class="opt-btn ${sel?"sel":""}" style="${sel?`border-color:${tc};border-width:2px;background:${(tagBg[opt.t]||"#f0f0f0")}`:""}" onclick="selectOpt(${q.id},${opt.s})">
        <span class="radio" style="${sel?`border-color:${tc}`:""}"><span class="rdot" style="background:${tc}"></span></span>
        <span class="opt-label">${opt.l}</span>
        ${opt.t&&opt.t!=="—"?`<span class="opt-tag" style="background:${tc}18;color:${tc}">${opt.t}</span>`:""}
      </button>`;
    });
    html+=`</div>`;
  });

  if(Object.keys(answers).length>0){
    html+=`<button class="reset-btn" onclick="resetAll()">Sıfırla</button>`;
  }

  html+=`<div class="footer"><strong>Matris bölgeleri:</strong> Core (sol alt, skor ≤2.3) = RTB | Adjacent (orta, 2.3–3.7) = CTB-Grow | Transformational (sağ üst, 3.7+) = CTB-Transform. Geçiş bölgeleri açık tonla gösterilir.<br>
  <strong>Tag çoğunluk koruması:</strong> Cevapların %65+ aynı yönelimde (orn. Grow) ise skor o sınıfın üst sınırını aşamaz — birkaç yüksek puanlı cevabın skoru Transform'a çekmesi engellenir.<br>
  <strong>Skor eşikleri:</strong> ≤2.0 → RTB-1/2 | 2.01–2.60 → RTB-2/3 | 2.61–3.40 → CTB-Grow | 3.41+ → CTB-Transform<br>
  <strong>Kaynaklar:</strong> Gartner RGT, HSBC, Cisco Rapid Risk, Info-Tech, Execution Excellence, TBM/ITFM</div>`;

  app.innerHTML=html;
}

function selectOpt(qid,score){
  answers[qid]=score;render();
  const cards=document.querySelectorAll(".q-card");
  const idx=questions.findIndex(q=>q.id===qid);
  if(idx<questions.length-1)setTimeout(()=>cards[idx+1]?.scrollIntoView({behavior:"smooth",block:"center"}),100);
}
function resetAll(){Object.keys(answers).forEach(k=>delete answers[k]);render();window.scrollTo({top:0,behavior:"smooth"});}

render();
</script>
</body>
</html>
