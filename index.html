<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proje Sınıflandırma & Portföy & Gantt</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f5f5;color:#2c2c2a;line-height:1.6}
.wrap{max-width:860px;margin:0 auto;padding:20px}
h1{font-size:22px;font-weight:600;color:#1B3A5C;margin-bottom:4px}
.sub{font-size:13px;color:#888;margin-bottom:16px}
.top-tabs{display:flex;gap:0;margin-bottom:20px;border-bottom:2px solid #e0e0e0}
.top-tab{flex:1;padding:12px 8px;text-align:center;cursor:pointer;font-size:13px;font-weight:500;color:#888;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .2s}
.top-tab.act{color:#1B3A5C;border-bottom-color:#2E75B6}
.top-tab:hover{color:#1B3A5C}
.page{display:none}.page.act{display:block}
.sticky{position:sticky;top:0;z-index:10;background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:16px 18px;margin-bottom:20px;box-shadow:0 2px 12px rgba(0,0,0,.08)}
.sticky-top{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:12px}
.score-block{display:flex;gap:16px;align-items:center;flex-shrink:0}
.score-num{font-size:28px;font-weight:600;line-height:1.2}
.score-label{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.5px}
.divider{width:1px;height:36px;background:#e0e0e0;flex-shrink:0}
.badge{display:inline-block;padding:3px 12px;border-radius:20px;font-size:14px;font-weight:600;white-space:nowrap}
.tag-counts{display:flex;gap:14px;flex-shrink:0}
.tag-count{text-align:center;min-width:48px}
.tag-count .num{font-size:20px;font-weight:600;line-height:1.2}
.tag-count .lbl{font-size:10px;color:#888}
.save-bar{display:flex;gap:8px;align-items:center;margin-top:12px;padding-top:12px;border-top:1px solid #e8e8e8;flex-wrap:wrap}
.save-bar input[type=text]{flex:1;min-width:150px;padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;outline:none}
.save-bar input:focus{border-color:#2E75B6}
.save-btn{padding:8px 20px;border:none;border-radius:8px;background:#2E75B6;color:#fff;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap}
.save-btn:hover{background:#185FA5}
.save-btn:disabled{background:#ccc;cursor:not-allowed}
.save-msg{font-size:12px;color:#548235;display:none}
.extra-fields{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;padding-top:8px;border-top:1px dashed #e8e8e8}
.ef{display:flex;flex-direction:column;gap:2px;flex:1;min-width:120px}
.ef label{font-size:11px;color:#888;font-weight:500}
.ef input,.ef select{padding:6px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px;outline:none}
.ef input:focus,.ef select:focus{border-color:#2E75B6}
.matrix-outer{margin-bottom:16px}
.matrix-wrap{position:relative;width:calc(100% - 32px);aspect-ratio:1.6/1;min-height:240px;background:#fff;border-radius:10px;border:1px solid #e8e8e8;overflow:hidden;margin-left:32px;margin-top:4px}
.y-label{position:absolute;left:0;top:50%;transform:rotate(-90deg) translateX(-50%);transform-origin:left center;white-space:nowrap;font-size:10px;font-weight:600;color:#888}
.x-label-row{display:flex;justify-content:space-between;align-items:center;padding:6px 4px 0 36px;font-size:10px;color:#aaa}
.zone{position:absolute;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:2px}
.zone-label{font-size:12px;font-weight:700;letter-spacing:.5px;opacity:.6}
.zone-sub{font-size:10px;opacity:.4}
.dot{position:absolute;width:20px;height:20px;border-radius:50%;border:3px solid #fff;box-shadow:0 2px 10px rgba(0,0,0,.3);transition:left .5s,top .5s,background .3s;z-index:5}
.dot-label{position:absolute;font-size:11px;font-weight:600;color:#1B3A5C;white-space:nowrap;transition:left .5s,top .5s;z-index:5;background:rgba(255,255,255,.92);padding:2px 8px;border-radius:4px;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.crosshair-h,.crosshair-v{position:absolute;transition:left .5s,top .5s;z-index:3}
.crosshair-h{height:1px;left:0;right:0;background:rgba(0,0,0,.08)}
.crosshair-v{width:1px;top:0;bottom:0;background:rgba(0,0,0,.08)}
.grid-line{position:absolute;background:rgba(0,0,0,.04)}
.grid-line-h{height:1px;left:0;right:0}.grid-line-v{width:1px;top:0;bottom:0}
.tick{position:absolute;font-size:8px;color:#bbb;font-weight:500}
.empty-hint{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:4;font-size:13px;color:#bbb}
.empty-hint span{background:rgba(255,255,255,.8);padding:6px 16px;border-radius:8px}
.scatter-dot{position:absolute;width:14px;height:14px;border-radius:50%;border:2px solid #fff;box-shadow:0 1px 6px rgba(0,0,0,.25);z-index:5;cursor:pointer;transition:transform .15s}
.scatter-dot:hover{transform:scale(1.4);z-index:10}
.scatter-tooltip{display:none;position:absolute;z-index:20;background:#fff;border:1px solid #ddd;border-radius:8px;padding:8px 12px;box-shadow:0 4px 16px rgba(0,0,0,.15);font-size:12px;line-height:1.5;max-width:220px;pointer-events:none}
.scatter-tooltip.vis{display:block}
.result-desc{padding:10px 14px;border-radius:8px;font-size:13px;line-height:1.5;margin-bottom:8px}
.warn-box{padding:8px 14px;border-radius:8px;font-size:12px;line-height:1.5;margin-bottom:8px;border:1px dashed}
.progress-bar{height:4px;background:#e0e0e0;border-radius:2px;overflow:hidden}
.progress-fill{height:4px;border-radius:2px;transition:width .3s}
.progress-text{font-size:11px;color:#999;margin-top:4px}
.q-card{border:1px solid #e0e0e0;border-radius:12px;padding:16px;margin-bottom:14px;background:#fff;transition:background .2s}
.q-card.answered{background:#fafafa}
.q-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;flex-wrap:wrap;gap:6px}
.q-header-left{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.q-num{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;font-size:12px;font-weight:600;color:#fff;background:#b0b0b0;transition:background .2s}
.q-num.active{background:#2E75B6}
.q-dim{font-size:11px;color:#888;border:1px solid #e0e0e0;padding:1px 8px;border-radius:4px}
.q-weight{font-size:11px;color:#888}
.q-src{font-size:10px;color:#aaa;font-style:italic}
.q-text{font-size:14px;font-weight:600;color:#1B3A5C;margin:8px 0 12px;line-height:1.5}
.opt-btn{display:flex;align-items:center;gap:10px;width:100%;padding:9px 14px;border:1px solid #e0e0e0;border-radius:8px;background:#fff;cursor:pointer;text-align:left;font-size:13px;color:#2c2c2a;line-height:1.4;margin-bottom:5px;transition:all .15s}
.opt-btn:hover{background:#f8f8f8}
.opt-btn.sel{border-width:2px}
.radio{flex-shrink:0;width:18px;height:18px;border-radius:50%;border:2px solid #ccc;display:flex;align-items:center;justify-content:center}
.radio .rdot{width:8px;height:8px;border-radius:50%;display:none}
.opt-btn.sel .radio .rdot{display:block}
.opt-label{flex:1}.opt-tag{flex-shrink:0;font-size:10px;padding:2px 7px;border-radius:4px;font-weight:600}
.reset-btn,.xls-btn{display:inline-block;margin:8px 4px;padding:8px 20px;border-radius:8px;border:1px solid #ccc;background:#fff;color:#888;cursor:pointer;font-size:13px}
.reset-btn:hover,.xls-btn:hover{background:#f0f0f0}
.xls-btn{border-color:#548235;color:#548235}
.xls-btn:hover{background:#EAF3DE}
.footer{margin-top:20px;padding:12px 16px;background:#f0f0f0;border-radius:8px;font-size:11px;color:#888;line-height:1.7}
.footer strong{color:#666}
.port-stats{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.stat-card{flex:1;min-width:100px;background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:14px;text-align:center}
.stat-card .num{font-size:28px;font-weight:600}
.stat-card .lbl{font-size:11px;color:#888;margin-top:2px}
.chart-row{display:flex;flex-direction:column;gap:20px;margin-top:20px}
.chart-col{width:100%;background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:20px}
.chart-col h3{font-size:16px;font-weight:500;color:#1B3A5C;margin-bottom:16px}
.pie-wrap{max-width:420px;margin:0 auto}
.proj-list{margin-top:20px;background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:16px}
.proj-list h3{font-size:16px;font-weight:500;color:#1B3A5C;margin-bottom:12px}
.proj-row{display:flex;align-items:center;padding:8px 12px;border-bottom:1px solid #f0f0f0;gap:10px;font-size:13px}
.proj-row:last-child{border-bottom:none}
.proj-row .pname{flex:1;font-weight:500}
.proj-row .pbadge{padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600;white-space:nowrap}
.proj-row .pscore{font-size:12px;color:#888;min-width:50px;text-align:right}
.proj-row .pdel{cursor:pointer;color:#ccc;font-size:16px;padding:4px 8px;border-radius:4px}
.proj-row .pdel:hover{color:#C00000;background:#FEF5F5}
.empty-port{text-align:center;padding:60px 20px;color:#bbb;font-size:14px}
/* Gantt */
.gantt-wrap{background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:20px;margin-bottom:16px}
.gantt-wrap h3{font-size:16px;font-weight:500;color:#1B3A5C;margin-bottom:16px}
.gantt-unit{margin-bottom:24px}
.gantt-unit-title{font-size:14px;font-weight:600;color:#1B3A5C;padding:8px 12px;background:#f8f8f8;border-radius:8px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.gantt-unit-title .res{font-size:11px;color:#888;font-weight:400}
.gantt-header{display:flex;border-bottom:1px solid #e0e0e0;margin-bottom:4px}
.gantt-label-col{width:180px;flex-shrink:0;font-size:11px;color:#888;padding:4px 8px}
.gantt-timeline{flex:1;display:flex;position:relative}
.gantt-week{flex:1;text-align:center;font-size:9px;color:#bbb;padding:4px 0;border-left:1px solid #f0f0f0}
.gantt-row{display:flex;align-items:center;min-height:32px;margin-bottom:2px}
.gantt-row-label{width:180px;flex-shrink:0;font-size:12px;padding:4px 8px;display:flex;align-items:center;gap:4px}
.gantt-row-label .prio-btns{display:flex;gap:2px}
.gantt-row-label .prio-btn{width:18px;height:18px;border:1px solid #ddd;border-radius:4px;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;color:#888;line-height:1}
.gantt-row-label .prio-btn:hover{background:#EBF2FA;border-color:#2E75B6;color:#2E75B6}
.gantt-row-bar-area{flex:1;position:relative;height:26px}
.gantt-bar{position:absolute;height:22px;top:2px;border-radius:4px;font-size:10px;color:#fff;font-weight:500;display:flex;align-items:center;padding:0 6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;box-shadow:0 1px 3px rgba(0,0,0,.15);cursor:default;transition:left .3s,width .3s}
.gantt-bar:hover{opacity:.9}
.gantt-today{position:absolute;top:0;bottom:0;width:2px;background:#C00000;z-index:3;opacity:.5}
.gantt-grid-line{position:absolute;top:0;bottom:0;width:1px;background:#f0f0f0}
@media(max-width:600px){.sticky-top{flex-direction:column;align-items:flex-start}.tag-counts{margin-top:8px}.matrix-wrap{aspect-ratio:1.3/1;min-height:200px}.port-stats{flex-direction:column}.gantt-row-label{width:120px}}
</style>
</head>
<body>
<div class="wrap">
<div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
<div style="width:6px;height:32px;background:#2E75B6;border-radius:3px"></div>
<div><h1>Proje sınıflandırma sistemi</h1>
<p class="sub" style="margin-bottom:0">Gartner RGT, HSBC RTB/CTB, Cisco Rapid Risk, Info-Tech, Execution Excellence, TBM/ITFM</p></div></div>
<div class="top-tabs">
<div class="top-tab act" onclick="switchTab(0)">Proje değerlendirme</div>
<div class="top-tab" onclick="switchTab(1)">Portföy görünümü</div>
<div class="top-tab" onclick="switchTab(2)">Kaynak & Gantt</div>
</div>
<div id="page0" class="page act"></div>
<div id="page1" class="page"></div>
<div id="page2" class="page"></div>
</div>
<script>
const questions=[
{id:1,dim:"Stratejik Hizalanma",src:"Gartner RGT",w:20,q:"Bu proje şirketin stratejik hedefleriyle nasıl ilişkileniyor?",opts:[
{s:1,l:"Tamamen operasyonel devamlılık — stratejik hedefle bağlantısı yok",t:"RTB"},{s:2,l:"Dolaylı stratejik destek — genel verimlilik artışı sağlıyor",t:"RTB"},{s:3,l:"Mevcut stratejik hedeflerin ölçeklendirilmesine katkı sağlıyor",t:"Grow"},{s:5,l:"Yeni bir stratejik yön veya iş modeli oluşturuyor",t:"Transform"}]},
{id:2,dim:"Değer Önermesi",src:"Gartner RGT / HSBC",w:15,q:"Projenin yarattığı değerin doğası nedir?",opts:[
{s:1,l:"Mevcut değeri koruma — yapılmazsa iş aksayacak (KTLO)",t:"RTB"},{s:2,l:"Risk azaltma veya uyumluluk sağlama (yasal, güvenlik)",t:"RTB"},{s:3,l:"Mevcut gelir/verimliliği artırma — aynı müşteri, aynı pazar",t:"Grow"},{s:4,l:"Mevcut müşterilere yeni ürün/hizmet sunma",t:"Grow"},{s:5,l:"Tamamen yeni gelir kaynağı, pazar veya müşteri segmenti yaratma",t:"Transform"}]},
{id:3,dim:"Hedef Pazar ve Müşteri",src:"Gartner Grow vs Transform",w:12,q:"Proje hangi müşteri segmentine ve pazara yönelik?",opts:[
{s:1,l:"İç kullanıcılar / operasyonel ekipler",t:"RTB"},{s:2,l:"Mevcut müşteri tabanı — mevcut kanallar",t:"RTB"},{s:3,l:"Mevcut müşteri tabanı — genişletilmiş kanallar",t:"Grow"},{s:4,l:"Mevcut müşteri tabanı — tamamen yeni temas noktası",t:"Grow"},{s:5,l:"Yeni müşteri segmenti veya girilmemiş pazar",t:"Transform"}]},
{id:4,dim:"Teknoloji Olgunluğu",src:"Cisco Rapid Risk",w:10,q:"Teknolojinin olgunluk seviyesi nedir?",opts:[
{s:1,l:"Kanıtlanmış — şirkette daha önce uygulanmış",t:"RTB"},{s:2,l:"Bilinen — sektörde yaygın, şirkette ilk",t:"RTB"},{s:3,l:"Olgunlaşmakta — referanslar mevcut",t:"Grow"},{s:4,l:"Yeni nesil — sınırlı referans, POC gerekli",t:"Transform"},{s:5,l:"Deneysel — endüstride yaygın kanıtı yok",t:"Transform"}]},
{id:5,dim:"Organizasyonel Etki",src:"Info-Tech",w:10,q:"Proje kaç birimi etkiliyor?",opts:[
{s:1,l:"Tek ekip/fonksiyon içi",t:"RTB"},{s:2,l:"Tek departman/bölüm",t:"RTB"},{s:3,l:"2–3 departman — çapraz koordinasyon",t:"Grow"},{s:4,l:"Şirket geneli — çoğu departman",t:"Transform"},{s:5,l:"Şirket + dış paydaşlar",t:"Transform"}]},
{id:6,dim:"İş Modeli Etkisi",src:"HSBC / Endeavor",w:15,q:"Mevcut iş modelini nasıl etkiliyor?",opts:[
{s:1,l:"İş modelinde değişiklik yok — bakım",t:"RTB"},{s:2,l:"Küçük iyileştirme — temel akış aynı",t:"RTB"},{s:3,l:"Verimlilik/kapasite artırma",t:"Grow"},{s:4,l:"Yeni bileşen/kanal ekleme",t:"Grow"},{s:5,l:"Tamamen yeni iş modeli/gelir mekanizması",t:"Transform"}]},
{id:7,dim:"Belirsizlik / Risk",src:"Gartner",w:8,q:"Sonuçlara ilişkin belirsizlik seviyesi?",opts:[
{s:1,l:"Öngörülebilir — benzer projeler yapılmış",t:"RTB"},{s:2,l:"Düşük — kapsam net",t:"RTB"},{s:3,l:"Orta — varsayımlar doğrulanmalı",t:"Grow"},{s:4,l:"Yüksek — hipotez doğrulama şart",t:"Transform"},{s:5,l:"Çok yüksek — birden fazla bilinmeyen",t:"Transform"}]},
{id:8,dim:"Başarı Ölçümü",src:"Execution Excellence",w:5,q:"Başarı nasıl ölçülecek?",opts:[
{s:1,l:"SLA, uptime, hata sayısı",t:"RTB"},{s:2,l:"Maliyet tasarrufu / risk azaltma (EUR)",t:"RTB"},{s:3,l:"Gelir artışı, cross-sell — gecikmeli göstergeler",t:"Grow"},{s:4,l:"Kullanıcı benimseme, NPS — öncü göstergeler",t:"Transform"},{s:5,l:"Hipotez doğrulama + kill criteria",t:"Transform"}]},
{id:9,dim:"Bütçeleme",src:"Gartner Stage-Gate",w:5,q:"En uygun bütçeleme yaklaşımı?",opts:[
{s:1,l:"Yıllık operasyonel bütçe içinde",t:"RTB"},{s:2,l:"Sabit bütçe — baştan belirli",t:"RTB"},{s:3,l:"Proje bazlı — business case sonrası",t:"Grow"},{s:4,l:"Aşama bazlı (stage-gate)",t:"Transform"},{s:5,l:"Discovery fonlaması — pivot opsiyonlu",t:"Transform"}]},
{id:10,dim:"Düzenleyici / Uyumluluk",src:"TBM / ITFM",w:0,q:"Düzenleyici veya yasal uyumluluk boyutu var mı?",opts:[
{s:-2,l:"Evet — yasal zorunluluk veya düzenleyici son tarih",t:"RTB"},{s:0,l:"Hayır — düzenleyici boyutu yok",t:"—"}]}
];

const UNITS=["IT Altyapı","Yazılım Geliştirme","Dijital Dönüşüm","Veri & Analitik","Sistem & Network","ERP & Entegrasyon","Müşteri Deneyimi","Satış & Pazarlama IT"];

const answers={};
let savedProjects=JSON.parse(localStorage.getItem('pmo_projects2')||'[]');
const TC={RTB:"#548235",Grow:"#C55A11",Transform:"#7030A0"};
const TB={RTB:"#EAF3DE",Grow:"#FAEEDA",Transform:"#EEEDFE"};
const CC={"RTB-1":"#548235","RTB-2":"#6B8E3A","RTB-3":"#C00000","CTB-Grow":"#C55A11","CTB-Transform":"#7030A0"};
const CB={"RTB-1":"#EAF3DE","RTB-2":"#EAF3DE","RTB-3":"#FCEBEB","CTB-Grow":"#FAEEDA","CTB-Transform":"#EEEDFE"};
const clsDescs={"RTB-1":"Rutin bakım. Portföye alınır.","RTB-2":"Birim içi iyileştirme. Portföye alınır.","RTB-3":"Çoklu birim etkisi. G3 mini fizibilite.","CTB-Grow":"Mevcut pazarda büyüme. G3 standart fizibilite.","CTB-Transform":"Stratejik dönüşüm. Keşif → MVP → Ölçekleme."};

function persist(){localStorage.setItem('pmo_projects2',JSON.stringify(savedProjects));}
function countTags(){const c={RTB:0,Grow:0,Transform:0};questions.forEach(q=>{if(answers[q.id]!==undefined){const o=q.opts.find(o=>o.s===answers[q.id]);if(o&&o.t&&c[o.t]!==undefined)c[o.t]++;}});return c;}
function classify(ws,q5,q10,tags){
  let adj=ws+(q10||0);const tot=tags.RTB+tags.Grow+tags.Transform;
  if(adj>3.40&&tot>0&&(tags.Grow/tot)>=.65&&tags.Transform<=2)adj=Math.min(adj,3.40);
  if(adj>2.60&&tot>0&&(tags.RTB/tot)>=.65&&tags.Grow<=1)adj=Math.min(adj,2.60);
  if(adj<=2){if((q5||1)<=2)return{cls:"RTB-1",label:"RTB-1 (Rutin)",adj};return{cls:"RTB-2",label:"RTB-2 (Birim İçi)",adj};}
  if(adj<=2.6){if((q5||1)>=3)return{cls:"RTB-3",label:"RTB-3 (Çoklu Birim)",adj};return{cls:"RTB-2",label:"RTB-2 (Birim İçi)",adj};}
  if(adj<=3.4)return{cls:"CTB-Grow",label:"CTB-Grow",adj};
  return{cls:"CTB-Transform",label:"CTB-Transform",adj};
}
function compute(){
  const sc=questions.filter(q=>q.w>0&&answers[q.id]!==undefined);if(!sc.length)return null;
  const wS=sc.reduce((s,q)=>s+answers[q.id]*q.w,0),wT=sc.reduce((s,q)=>s+q.w,0),ws=wS/wT;
  const tags=countTags(),cls=classify(ws,answers[5],answers[10],tags);
  return{score:ws,cls,answered:sc.length,total:questions.filter(q=>q.w>0).length,rawScore:ws,adjScore:cls.adj};
}
function computeAxes(a){const an=a||answers;const xQ=[6,2,3],yQ=[1,4,7];let xS=0,xC=0,yS=0,yC=0;xQ.forEach(id=>{if(an[id]!==undefined){xS+=an[id];xC++;}});yQ.forEach(id=>{if(an[id]!==undefined){yS+=an[id];yC++;}});return{x:xC?xS/xC:null,y:yC?yS/yC:null};}
function matrixZones(){return`<div class="zone" style="left:0;top:66.6%;width:100%;height:33.4%;background:#E8F0E0"><span class="zone-label" style="color:#548235">CORE</span><span class="zone-sub" style="color:#548235">RTB</span></div><div class="zone" style="left:0;top:33.3%;width:100%;height:33.3%;background:#FDF3E0"><span class="zone-label" style="color:#C55A11">ADJACENT</span><span class="zone-sub" style="color:#C55A11">CTB-Grow</span></div><div class="zone" style="left:0;top:0;width:100%;height:33.3%;background:#F0ECFA"><span class="zone-label" style="color:#7030A0">TRANSFORMATIONAL</span><span class="zone-sub" style="color:#7030A0">CTB-Transform</span></div><div style="position:absolute;left:0;right:0;top:33.3%;height:1px;background:rgba(0,0,0,.1)"></div><div style="position:absolute;left:0;right:0;top:66.6%;height:1px;background:rgba(0,0,0,.1)"></div>`;}
function matrixGrid(){let h='';for(let i=1;i<=4;i++){const p=(i/5)*100;h+=`<div class="grid-line grid-line-h" style="top:${100-p}%"></div><div class="grid-line grid-line-v" style="left:${p}%"></div>`;}for(let i=1;i<=5;i++){h+=`<div class="tick" style="bottom:3px;left:${((i-1)/4)*100}%;transform:translateX(-50%)">${i}</div><div class="tick" style="left:3px;bottom:${((i-1)/4)*100}%;transform:translateY(50%)">${i}</div>`;}return h;}

function saveProject(){
  const nm=document.getElementById('proj-name').value.trim();if(!nm)return;
  const res=compute();if(!res||res.answered<9)return;
  const dur=parseInt(document.getElementById('proj-dur').value)||4;
  const unit=document.getElementById('proj-unit').value||UNITS[0];
  const ppl=parseInt(document.getElementById('proj-ppl').value)||1;
  const axes=computeAxes();
  savedProjects.push({name:nm,score:res.adjScore,rawScore:res.rawScore,cls:res.cls.cls,label:res.cls.label,x:axes.x,y:axes.y,answers:{...answers},date:new Date().toISOString().slice(0,10),duration:dur,unit,people:ppl,priority:savedProjects.filter(p=>p.unit===unit).length});
  persist();
  document.getElementById('proj-name').value='';
  const msg=document.getElementById('save-msg');msg.style.display='inline';msg.textContent=`"${nm}" kaydedildi`;setTimeout(()=>msg.style.display='none',2500);
  Object.keys(answers).forEach(k=>delete answers[k]);render();
}
function deleteProject(i){if(!confirm(`"${savedProjects[i].name}" silinecek?`))return;savedProjects.splice(i,1);persist();renderPortfolio();}

function exportExcel(){
  const data=savedProjects.map(p=>({Proje:p.name,Sınıf:p.cls,Etiket:p.label||"",Skor:p.score,X:p.x,Y:p.y,Birim:p.unit||"",Süre_Hafta:p.duration||0,Kaynak_Kişi:p.people||0,Tarih:p.date||"",Öncelik:p.priority||0}));
  const ws=XLSX.utils.json_to_sheet(data);const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,"Projeler");
  XLSX.writeFile(wb,"pmo_portfoy_"+new Date().toISOString().slice(0,10)+".xlsx");
}
function importExcel(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.xlsx,.xls';
  inp.onchange=e=>{const f=e.target.files[0];if(!f)return;const rd=new FileReader();rd.onload=ev=>{
    const wb=XLSX.read(ev.target.result,{type:'binary'});const ws=wb.Sheets[wb.SheetNames[0]];const rows=XLSX.utils.sheet_to_json(ws);
    rows.forEach(r=>{savedProjects.push({name:r.Proje||"İsimsiz",score:r.Skor||0,rawScore:r.Skor||0,cls:r.Sınıf||"RTB-1",label:r.Etiket||r.Sınıf||"",x:r.X||null,y:r.Y||null,answers:{},date:r.Tarih||"",duration:r.Süre_Hafta||4,unit:r.Birim||UNITS[0],people:r.Kaynak_Kişi||1,priority:r.Öncelik||0});});
    persist();alert(`${rows.length} proje yüklendi.`);renderPortfolio();renderGantt();};rd.readAsBinaryString(f);};inp.click();
}

function switchTab(n){document.querySelectorAll('.top-tab').forEach((t,i)=>t.classList.toggle('act',i===n));document.querySelectorAll('.page').forEach((p,i)=>p.classList.toggle('act',i===n));if(n===1)renderPortfolio();if(n===2)renderGantt();}

// ============ TAB 1: SCORING ============
function render(){
  const res=compute(),tags=countTags(),el=document.getElementById('page0');let h='';
  h+=`<div class="sticky"><div class="sticky-top"><div class="score-block">`;
  if(res&&res.answered>0){const c=CC[res.cls.cls]||"#999",bg=CB[res.cls.cls]||"#f0f0f0",sa=Math.abs(res.rawScore-res.adjScore)>0.01;
    h+=`<div><div class="score-label">Ağırlıklı skor${sa?" (düzeltilmiş)":""}</div><div class="score-num" style="color:${c}">${res.adjScore.toFixed(2)}</div>${sa?`<div style="font-size:10px;color:#aaa;text-decoration:line-through">${res.rawScore.toFixed(2)}</div>`:""}</div><div class="divider"></div><div><div class="score-label">Sınıflandırma</div><div class="badge" style="background:${bg};color:${c}">${res.cls.label}</div></div>`;
  }else{h+=`<div><div class="score-label">Ağırlıklı skor</div><div class="score-num" style="color:#ccc">—</div></div><div class="divider"></div><div><div class="score-label">Sınıflandırma</div><div class="badge" style="background:#f0f0f0;color:#999">Yanıt bekleniyor</div></div>`;}
  h+=`</div><div class="tag-counts">${["RTB","Grow","Transform"].map(k=>`<div class="tag-count"><div class="num" style="color:${TC[k]}">${tags[k]}</div><div class="lbl">${k}</div></div>`).join("")}</div></div>`;
  // Matrix
  const axes=computeAxes(),hasD=axes.x!==null||axes.y!==null,xN=axes.x!==null?(axes.x-1)/4:.15,yN=axes.y!==null?(axes.y-1)/4:.15,dc=res?CC[res.cls.cls]||"#999":"#999";
  h+=`<div class="matrix-outer"><div style="position:relative"><div class="y-label">İnovasyon derinliği (S1, S4, S7) →</div><div class="matrix-wrap">${matrixZones()}${matrixGrid()}`;
  if(hasD){const lL=xN>.75?`calc(${xN*100}% - 140px)`:`calc(${xN*100}% + 16px)`;h+=`<div class="crosshair-h" style="top:${(1-yN)*100}%"></div><div class="crosshair-v" style="left:${xN*100}%"></div><div class="dot" style="left:calc(${xN*100}% - 10px);top:calc(${(1-yN)*100}% - 10px);background:${dc}"></div><div class="dot-label" style="left:${lL};top:calc(${(1-yN)*100}% - 12px)">${res?res.cls.label:"..."}</div>`;}
  else h+=`<div class="empty-hint"><span>Soruları yanıtladıkça proje konumlanacak</span></div>`;
  h+=`</div></div><div class="x-label-row"><span>X: İş modeli değişimi (S2, S3, S6)</span><span>Y: İnovasyon derinliği (S1, S4, S7)</span><span>Koordinat: (${axes.x?.toFixed(1)??"—"}, ${axes.y?.toFixed(1)??"—"})</span></div></div>`;
  // Warnings & result
  if(res&&res.answered>=5){const tot=tags.RTB+tags.Grow+tags.Transform;if(tot>0&&Math.abs(res.rawScore-res.adjScore)>.01){const gP=tags.Grow/tot,rP=tags.RTB/tot,dom=gP>=.65?"Grow":rP>=.65?"RTB":"";if(dom)h+=`<div class="warn-box" style="background:#FFF8F0;border-color:#C55A11;color:#C55A11"><strong>Düzeltme:</strong> Ham skor ${res.rawScore.toFixed(2)} → ${res.adjScore.toFixed(2)} (cevapların %${Math.round((dom==="Grow"?gP:rP)*100)}'${dom==="Grow"?"i":"ü"} ${dom})</div>`;}}
  if(res&&res.answered>=9)h+=`<div class="result-desc" style="background:${CB[res.cls.cls]||"#f0f0f0"};color:${CC[res.cls.cls]||"#999"}">${clsDescs[res.cls.cls]||""}</div>`;
  const an=res?res.answered:0,tt=res?res.total:9;
  h+=`<div class="progress-bar"><div class="progress-fill" style="width:${(an/tt)*100}%;background:#2E75B6"></div></div><div class="progress-text">${an}/${tt} soru yanıtlandı</div>`;
  // Save bar + extra fields
  const canS=res&&res.answered>=9;
  h+=`<div class="save-bar"><input type="text" id="proj-name" placeholder="Proje adı..." ${canS?"":"disabled"}><button class="save-btn" onclick="saveProject()" ${canS?"":"disabled"}>Kaydet</button><span class="save-msg" id="save-msg"></span></div>`;
  h+=`<div class="extra-fields">
    <div class="ef"><label>Tahmini süre (hafta)</label><input type="number" id="proj-dur" min="1" max="104" value="4" ${canS?"":"disabled"}></div>
    <div class="ef"><label>İlgilenecek birim</label><select id="proj-unit" ${canS?"":"disabled"}>${UNITS.map(u=>`<option>${u}</option>`).join("")}</select></div>
    <div class="ef"><label>Kaynak ihtiyacı (kişi)</label><input type="number" id="proj-ppl" min="1" max="50" value="2" ${canS?"":"disabled"}></div>
  </div>`;
  h+=`</div>`;
  // Questions
  questions.forEach((q,qi)=>{const a=answers[q.id];h+=`<div class="q-card ${a!==undefined?"answered":""}"><div class="q-header"><div class="q-header-left"><span class="q-num ${a!==undefined?"active":""}">${qi+1}</span><span class="q-dim">${q.dim}</span>${q.w>0?`<span class="q-weight">%${q.w}</span>`:""}</div><span class="q-src">${q.src}</span></div><div class="q-text">${q.q}</div>`;q.opts.forEach(opt=>{const sel=a===opt.s,tc=TC[opt.t]||"#999";h+=`<button class="opt-btn ${sel?"sel":""}" style="${sel?`border-color:${tc};border-width:2px;background:${TB[opt.t]||"#f0f0f0"}`:""}" onclick="selectOpt(${q.id},${opt.s})"><span class="radio" style="${sel?`border-color:${tc}`:""}"><span class="rdot" style="background:${tc}"></span></span><span class="opt-label">${opt.l}</span>${opt.t&&opt.t!=="—"?`<span class="opt-tag" style="background:${tc}18;color:${tc}">${opt.t}</span>`:""}</button>`;});h+=`</div>`;});
  if(Object.keys(answers).length>0)h+=`<button class="reset-btn" onclick="resetAll()">Sıfırla</button>`;
  el.innerHTML=h;
}
function selectOpt(qid,sc){answers[qid]=sc;render();const cs=document.querySelectorAll('.q-card'),idx=questions.findIndex(q=>q.id===qid);if(idx<questions.length-1)setTimeout(()=>cs[idx+1]?.scrollIntoView({behavior:"smooth",block:"center"}),100);}
function resetAll(){Object.keys(answers).forEach(k=>delete answers[k]);render();window.scrollTo({top:0,behavior:"smooth"});}

// ============ TAB 2: PORTFOLIO ============
let pieChart=null;
function renderPortfolio(){
  const el=document.getElementById('page1'),P=savedProjects;
  if(!P.length){el.innerHTML=`<div class="empty-port"><p style="font-size:40px;opacity:.3;margin-bottom:12px">📊</p><p>Henüz kaydedilmiş proje yok.</p><p style="font-size:12px;color:#aaa;margin-top:8px">İlk sekmede değerlendirip kaydedin veya mevcut bir Excel dosyasından yükleyin.</p><div style="margin-top:20px"><button class="xls-btn" onclick="importExcel()" style="font-size:14px;padding:10px 24px">📤 Excel'den yükle</button></div></div>`;return;}
  const clsC={"RTB-1":0,"RTB-2":0,"RTB-3":0,"CTB-Grow":0,"CTB-Transform":0};P.forEach(p=>clsC[p.cls]=(clsC[p.cls]||0)+1);const tP=P.length;
  let h=`<div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap"><button class="xls-btn" onclick="exportExcel()">📥 Excel'e aktar</button><button class="xls-btn" onclick="importExcel()">📤 Excel'den yükle</button></div>`;
  h+=`<div class="port-stats"><div class="stat-card"><div class="num" style="color:#1B3A5C">${tP}</div><div class="lbl">Toplam</div></div><div class="stat-card"><div class="num" style="color:#548235">${clsC["RTB-1"]+clsC["RTB-2"]+clsC["RTB-3"]}</div><div class="lbl">RTB</div></div><div class="stat-card"><div class="num" style="color:#C55A11">${clsC["CTB-Grow"]}</div><div class="lbl">Grow</div></div><div class="stat-card"><div class="num" style="color:#7030A0">${clsC["CTB-Transform"]}</div><div class="lbl">Transform</div></div></div>`;
  // Scatter
  h+=`<div class="chart-row"><div class="chart-col"><h3>Portföy matrisi</h3><div class="matrix-outer"><div style="position:relative"><div class="y-label">İnovasyon derinliği →</div><div class="matrix-wrap" id="scatter-matrix" style="min-height:360px">${matrixZones()}${matrixGrid()}`;
  P.forEach((p,i)=>{if(p.x==null||p.y==null)return;const xN=(p.x-1)/4,yN=(p.y-1)/4;h+=`<div class="scatter-dot" style="left:calc(${xN*100}% - 7px);top:calc(${(1-yN)*100}% - 7px);background:${CC[p.cls]||"#999"}" onmouseenter="showTip(event,${i})" onmouseleave="hideTip()"></div>`;});
  h+=`<div class="scatter-tooltip" id="scatter-tip"></div></div></div><div class="x-label-row"><span>İş modeli değişimi →</span><span>${tP} proje</span></div></div></div>`;
  // Pie
  h+=`<div class="chart-col"><h3>Sınıf dağılımı</h3><div class="pie-wrap"><canvas id="pie-chart"></canvas></div></div></div>`;
  // List
  h+=`<div class="proj-list"><h3>Projeler (${tP})</h3>`;
  P.forEach((p,i)=>{h+=`<div class="proj-row"><div class="pname">${p.name}</div><div class="pbadge" style="background:${CB[p.cls]||"#f0f0f0"};color:${CC[p.cls]||"#999"}">${p.label||p.cls}</div><div class="pscore">${p.score?.toFixed(2)||"—"}</div><div class="pscore">${p.unit||"—"}</div><div class="pscore">${p.duration||0}hf</div><div class="pdel" onclick="deleteProject(${i})" title="Sil">×</div></div>`;});
  h+=`</div>`;
  el.innerHTML=h;
  // Pie chart
  const cv=document.getElementById('pie-chart');if(cv){if(pieChart)pieChart.destroy();const lbs=Object.keys(clsC).filter(k=>clsC[k]>0),dt=lbs.map(k=>clsC[k]),cls=lbs.map(k=>CC[k]),pcts=lbs.map(k=>`${k}: %${(clsC[k]/tP*100).toFixed(0)}`);pieChart=new Chart(cv,{type:'doughnut',data:{labels:pcts,datasets:[{data:dt,backgroundColor:cls,borderWidth:2,borderColor:'#fff'}]},options:{responsive:true,maintainAspectRatio:true,plugins:{legend:{position:'bottom',labels:{font:{size:12},padding:12,usePointStyle:true}}}}});}
}
function showTip(e,i){const p=savedProjects[i];if(!p)return;const t=document.getElementById('scatter-tip'),m=document.getElementById('scatter-matrix'),r=m.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;t.innerHTML=`<div style="font-weight:600">${p.name}</div><div style="display:inline-block;padding:1px 6px;border-radius:8px;font-size:10px;font-weight:600;background:${CB[p.cls]||"#f0f0f0"};color:${CC[p.cls]||"#999"}">${p.label||p.cls}</div><div style="margin-top:4px;color:#888">Skor: ${p.score?.toFixed(2)||"—"} | ${p.unit||""} | ${p.duration||0}hf | ${p.people||0} kişi</div>`;t.style.left=(mx>r.width*.6?(mx-230):(mx+20))+'px';t.style.top=(my-10)+'px';t.classList.add('vis');}
function hideTip(){document.getElementById('scatter-tip')?.classList.remove('vis');}

// ============ TAB 3: GANTT ============
function renderGantt(){
  const el=document.getElementById('page2'),P=savedProjects;
  if(!P.length){el.innerHTML=`<div class="empty-port"><p style="font-size:40px;opacity:.3;margin-bottom:12px">📅</p><p>Gantt görünümü için önce proje kaydedin.</p><div style="margin-top:20px"><button class="xls-btn" onclick="importExcel()" style="font-size:14px;padding:10px 24px">📤 Excel'den yükle</button></div></div>`;return;}
  // Group by unit
  const units={};P.forEach((p,i)=>{const u=p.unit||"Atanmamış";if(!units[u])units[u]=[];units[u].push({...p,idx:i});});
  // Sort each unit by priority (lower = higher priority = earlier)
  Object.values(units).forEach(arr=>arr.sort((a,b)=>(a.priority||0)-(b.priority||0)));
  // Calculate max weeks for timeline
  let maxWeek=0;
  Object.values(units).forEach(arr=>{let wk=0;arr.forEach(p=>{wk+=(p.duration||4);if(wk>maxWeek)maxWeek=wk;});});
  maxWeek=Math.max(maxWeek+4,24);// at least 24 weeks
  const weekCount=Math.min(maxWeek,52);

  let h=`<div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap"><button class="xls-btn" onclick="exportExcel()">📥 Excel'e aktar</button></div>`;
  h+=`<div class="gantt-wrap"><h3>Kaynak & Zaman Planlaması</h3>`;
  h+=`<div style="font-size:11px;color:#888;margin-bottom:12px">Projeleri ↑↓ butonlarıyla yeniden sıralayın — öncelik değiştikçe zaman çizelgesi otomatik güncellenir.</div>`;

  Object.keys(units).sort().forEach(unitName=>{
    const projs=units[unitName];
    const totalPeople=projs.reduce((s,p)=>s+(p.people||1),0);
    h+=`<div class="gantt-unit">`;
    h+=`<div class="gantt-unit-title"><span>📁 ${unitName}</span><span class="res">${projs.length} proje · ${totalPeople} kişi toplam kaynak</span></div>`;
    // Header
    h+=`<div class="gantt-header"><div class="gantt-label-col">Proje</div><div class="gantt-timeline">`;
    for(let w=1;w<=weekCount;w++)h+=`<div class="gantt-week">${w%4===0?`Ay ${w/4}`:''}</div>`;
    h+=`</div></div>`;
    // Rows
    let cumWeek=0;
    projs.forEach((p,pi)=>{
      const dur=p.duration||4;
      const startPct=(cumWeek/weekCount)*100;
      const widthPct=(dur/weekCount)*100;
      const c=CC[p.cls]||"#999";
      h+=`<div class="gantt-row">`;
      h+=`<div class="gantt-row-label"><div class="prio-btns"><button class="prio-btn" onclick="movePrio('${unitName}',${pi},-1)" title="Yukarı">↑</button><button class="prio-btn" onclick="movePrio('${unitName}',${pi},1)" title="Aşağı">↓</button></div><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${p.name}">${p.name}</span></div>`;
      h+=`<div class="gantt-row-bar-area">`;
      // Grid lines
      for(let w=4;w<=weekCount;w+=4)h+=`<div class="gantt-grid-line" style="left:${(w/weekCount)*100}%"></div>`;
      h+=`<div class="gantt-bar" style="left:${startPct}%;width:${widthPct}%;background:${c}" title="${p.name}: Hafta ${cumWeek+1}–${cumWeek+dur} (${dur} hf, ${p.people||1} kişi)">${p.name} (${dur}hf)</div>`;
      h+=`</div></div>`;
      cumWeek+=dur;
    });
    h+=`</div>`;
  });

  // Legend
  h+=`<div style="display:flex;gap:16px;flex-wrap:wrap;margin-top:16px;padding-top:12px;border-top:1px solid #e8e8e8">`;
  [["RTB-1","#548235"],["RTB-2","#6B8E3A"],["RTB-3","#C00000"],["CTB-Grow","#C55A11"],["CTB-Transform","#7030A0"]].forEach(([l,c])=>{
    h+=`<div style="display:flex;align-items:center;gap:4px;font-size:11px"><div style="width:12px;height:12px;border-radius:3px;background:${c}"></div>${l}</div>`;
  });
  h+=`</div></div>`;

  // Summary table
  h+=`<div class="gantt-wrap"><h3>Birim bazlı kaynak özeti</h3><table style="width:100%;border-collapse:collapse;font-size:13px">`;
  h+=`<tr style="border-bottom:2px solid #1B3A5C;color:#1B3A5C;font-weight:600"><td style="padding:8px">Birim</td><td style="padding:8px;text-align:center">Proje sayısı</td><td style="padding:8px;text-align:center">Toplam süre (hf)</td><td style="padding:8px;text-align:center">Toplam kaynak (kişi)</td></tr>`;
  Object.keys(units).sort().forEach((u,i)=>{
    const arr=units[u];const bg=i%2===0?'#f8f8f8':'#fff';
    h+=`<tr style="background:${bg}"><td style="padding:8px">${u}</td><td style="padding:8px;text-align:center">${arr.length}</td><td style="padding:8px;text-align:center">${arr.reduce((s,p)=>s+(p.duration||4),0)}</td><td style="padding:8px;text-align:center">${arr.reduce((s,p)=>s+(p.people||1),0)}</td></tr>`;
  });
  h+=`</table></div>`;

  el.innerHTML=h;
}

function movePrio(unitName,localIdx,dir){
  // Find the projects in this unit
  const unitProjs=savedProjects.map((p,i)=>({...p,globalIdx:i})).filter(p=>(p.unit||"Atanmamış")===unitName);
  unitProjs.sort((a,b)=>(a.priority||0)-(b.priority||0));
  const newIdx=localIdx+dir;
  if(newIdx<0||newIdx>=unitProjs.length)return;
  // Swap priorities
  const aGlobal=unitProjs[localIdx].globalIdx;
  const bGlobal=unitProjs[newIdx].globalIdx;
  const tmpPrio=savedProjects[aGlobal].priority;
  savedProjects[aGlobal].priority=savedProjects[bGlobal].priority;
  savedProjects[bGlobal].priority=tmpPrio;
  persist();
  renderGantt();
}

render();
</script>
