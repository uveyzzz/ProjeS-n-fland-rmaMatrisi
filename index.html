<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proje Sınıflandırma & Portföy & Gantt</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f5f5;color:#2c2c2a;line-height:1.6}
.wrap{max-width:900px;margin:0 auto;padding:20px}
h1{font-size:22px;font-weight:600;color:#1B3A5C;margin-bottom:4px}
.sub{font-size:13px;color:#888;margin-bottom:16px}
.top-tabs{display:flex;gap:0;margin-bottom:20px;border-bottom:2px solid #e0e0e0}
.top-tab{flex:1;padding:12px 8px;text-align:center;cursor:pointer;font-size:13px;font-weight:500;color:#888;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .2s}
.top-tab.act{color:#1B3A5C;border-bottom-color:#2E75B6}.top-tab:hover{color:#1B3A5C}
.page{display:none}.page.act{display:block}
.sticky{position:sticky;top:0;z-index:10;background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:16px 18px;margin-bottom:20px;box-shadow:0 2px 12px rgba(0,0,0,.08)}
.sticky-top{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:12px}
.score-block{display:flex;gap:16px;align-items:center;flex-shrink:0}
.score-num{font-size:28px;font-weight:600;line-height:1.2}
.score-label{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.5px}
.divider{width:1px;height:36px;background:#e0e0e0;flex-shrink:0}
.badge{display:inline-block;padding:3px 12px;border-radius:20px;font-size:14px;font-weight:600;white-space:nowrap}
.tag-counts{display:flex;gap:14px;flex-shrink:0}
.tag-count{text-align:center;min-width:48px}
.tag-count .num{font-size:20px;font-weight:600;line-height:1.2}
.tag-count .lbl{font-size:10px;color:#888}
.save-section{margin-top:12px;padding-top:12px;border-top:1px solid #e8e8e8}
.save-section h4{font-size:13px;font-weight:600;color:#1B3A5C;margin-bottom:8px}
.field-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.ef{display:flex;flex-direction:column;gap:2px}
.ef.full{grid-column:1/-1}
.ef label{font-size:11px;color:#888;font-weight:500}
.ef input,.ef select{padding:7px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px;outline:none;width:100%}
.ef input:focus,.ef select:focus{border-color:#2E75B6}
.save-row{display:flex;gap:8px;align-items:center}
.save-btn{padding:8px 24px;border:none;border-radius:8px;background:#2E75B6;color:#fff;font-size:13px;font-weight:500;cursor:pointer}
.save-btn:hover{background:#185FA5}
.save-btn:disabled{background:#ccc;cursor:not-allowed}
.save-msg{font-size:12px;color:#548235;margin-left:8px}
.matrix-outer{margin-bottom:16px}
.matrix-wrap{position:relative;width:calc(100% - 32px);aspect-ratio:1.6/1;min-height:240px;background:#fff;border-radius:10px;border:1px solid #e8e8e8;overflow:hidden;margin-left:32px;margin-top:4px}
.y-label{position:absolute;left:0;top:50%;transform:rotate(-90deg) translateX(-50%);transform-origin:left center;white-space:nowrap;font-size:10px;font-weight:600;color:#888}
.x-label-row{display:flex;justify-content:space-between;align-items:center;padding:6px 4px 0 36px;font-size:10px;color:#aaa}
.zone{position:absolute;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:2px}
.zone-label{font-size:12px;font-weight:700;letter-spacing:.5px;opacity:.6}
.zone-sub{font-size:10px;opacity:.4}
.dot{position:absolute;width:20px;height:20px;border-radius:50%;border:3px solid #fff;box-shadow:0 2px 10px rgba(0,0,0,.3);transition:left .5s,top .5s,background .3s;z-index:5}
.dot-label{position:absolute;font-size:11px;font-weight:600;color:#1B3A5C;white-space:nowrap;transition:left .5s,top .5s;z-index:5;background:rgba(255,255,255,.92);padding:2px 8px;border-radius:4px;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.crosshair-h,.crosshair-v{position:absolute;transition:left .5s,top .5s;z-index:3}
.crosshair-h{height:1px;left:0;right:0;background:rgba(0,0,0,.08)}
.crosshair-v{width:1px;top:0;bottom:0;background:rgba(0,0,0,.08)}
.grid-line{position:absolute;background:rgba(0,0,0,.04)}
.grid-line-h{height:1px;left:0;right:0}.grid-line-v{width:1px;top:0;bottom:0}
.tick{position:absolute;font-size:8px;color:#bbb;font-weight:500}
.empty-hint{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:4;font-size:13px;color:#bbb}
.empty-hint span{background:rgba(255,255,255,.8);padding:6px 16px;border-radius:8px}
.scatter-dot{position:absolute;width:14px;height:14px;border-radius:50%;border:2px solid #fff;box-shadow:0 1px 6px rgba(0,0,0,.25);z-index:5;cursor:pointer;transition:transform .15s}
.scatter-dot:hover{transform:scale(1.4);z-index:10}
.scatter-tooltip{display:none;position:absolute;z-index:20;background:#fff;border:1px solid #ddd;border-radius:8px;padding:8px 12px;box-shadow:0 4px 16px rgba(0,0,0,.15);font-size:12px;line-height:1.5;max-width:240px;pointer-events:none}
.scatter-tooltip.vis{display:block}
.result-desc{padding:10px 14px;border-radius:8px;font-size:13px;line-height:1.5;margin-bottom:8px}
.warn-box{padding:8px 14px;border-radius:8px;font-size:12px;line-height:1.5;margin-bottom:8px;border:1px dashed}
.progress-bar{height:4px;background:#e0e0e0;border-radius:2px;overflow:hidden}
.progress-fill{height:4px;border-radius:2px;transition:width .3s}
.progress-text{font-size:11px;color:#999;margin-top:4px}
.q-card{border:1px solid #e0e0e0;border-radius:12px;padding:16px;margin-bottom:14px;background:#fff;transition:background .2s}
.q-card.answered{background:#fafafa}
.q-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;flex-wrap:wrap;gap:6px}
.q-header-left{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.q-num{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;font-size:12px;font-weight:600;color:#fff;background:#b0b0b0;transition:background .2s}
.q-num.active{background:#2E75B6}
.q-dim{font-size:11px;color:#888;border:1px solid #e0e0e0;padding:1px 8px;border-radius:4px}
.q-weight{font-size:11px;color:#888}
.q-src{font-size:10px;color:#aaa;font-style:italic}
.q-text{font-size:14px;font-weight:600;color:#1B3A5C;margin:8px 0 12px;line-height:1.5}
.opt-btn{display:flex;align-items:center;gap:10px;width:100%;padding:9px 14px;border:1px solid #e0e0e0;border-radius:8px;background:#fff;cursor:pointer;text-align:left;font-size:13px;color:#2c2c2a;line-height:1.4;margin-bottom:5px;transition:all .15s}
.opt-btn:hover{background:#f8f8f8}
.opt-btn.sel{border-width:2px}
.radio{flex-shrink:0;width:18px;height:18px;border-radius:50%;border:2px solid #ccc;display:flex;align-items:center;justify-content:center}
.radio .rdot{width:8px;height:8px;border-radius:50%;display:none}
.opt-btn.sel .radio .rdot{display:block}
.opt-label{flex:1}.opt-tag{flex-shrink:0;font-size:10px;padding:2px 7px;border-radius:4px;font-weight:600}
.reset-btn,.xls-btn{display:inline-block;margin:8px 4px;padding:8px 20px;border-radius:8px;border:1px solid #ccc;background:#fff;color:#888;cursor:pointer;font-size:13px}
.reset-btn:hover,.xls-btn:hover{background:#f0f0f0}
.xls-btn{border-color:#548235;color:#548235}.xls-btn:hover{background:#EAF3DE}
.port-stats{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.stat-card{flex:1;min-width:80px;background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:14px;text-align:center}
.stat-card .num{font-size:28px;font-weight:600}.stat-card .lbl{font-size:11px;color:#888;margin-top:2px}
.chart-row{display:flex;flex-direction:column;gap:20px;margin-top:20px}
.chart-col{width:100%;background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:20px}
.chart-col h3{font-size:16px;font-weight:500;color:#1B3A5C;margin-bottom:16px}
.pie-wrap{max-width:420px;margin:0 auto}
.proj-list{margin-top:20px;background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:16px;overflow-x:auto}
.proj-list h3{font-size:16px;font-weight:500;color:#1B3A5C;margin-bottom:12px}
.proj-row{display:flex;align-items:center;padding:8px 12px;border-bottom:1px solid #f0f0f0;gap:10px;font-size:12px;min-width:600px}
.proj-row:last-child{border-bottom:none}
.proj-row .pname{flex:1.5;font-weight:500;min-width:120px}
.proj-row .pbadge{padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600;white-space:nowrap}
.proj-row .pcol{flex:1;color:#888;min-width:60px;text-align:center;font-size:11px}
.proj-row .pdel{cursor:pointer;color:#ccc;font-size:16px;padding:4px 8px;border-radius:4px;flex-shrink:0}
.proj-row .pdel:hover{color:#C00000;background:#FEF5F5}
.empty-port{text-align:center;padding:60px 20px;color:#bbb;font-size:14px}
/* Gantt */
.gantt-wrap{background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:20px;margin-bottom:16px;overflow-x:auto}
.gantt-wrap h3{font-size:16px;font-weight:500;color:#1B3A5C;margin-bottom:16px}
.gantt-scroll{min-width:800px}
.gantt-unit{margin-bottom:24px}
.gantt-unit-title{font-size:14px;font-weight:600;color:#1B3A5C;padding:8px 12px;background:#f8f8f8;border-radius:8px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.gantt-unit-title .res{font-size:11px;color:#888;font-weight:400}
.gantt-header{display:flex;border-bottom:2px solid #e0e0e0;margin-bottom:2px}
.gantt-label-col{width:200px;flex-shrink:0;font-size:11px;color:#888;padding:4px 8px}
.gantt-timeline{flex:1;display:flex;position:relative;min-width:0}
.gantt-month{display:flex;flex-direction:column;flex:1;min-width:0}
.gantt-month-name{text-align:center;font-size:10px;font-weight:600;color:#1B3A5C;padding:2px 0;border-left:1px solid #ddd;background:#f8f8f8}
.gantt-weeks{display:flex;flex:1}
.gantt-wk{flex:1;text-align:center;font-size:8px;color:#bbb;padding:2px 0;border-left:1px solid #f0f0f0}
.gantt-row{display:flex;align-items:center;min-height:30px;margin-bottom:1px}
.gantt-row-label{width:200px;flex-shrink:0;font-size:11px;padding:4px 8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.gantt-row-bar-area{flex:1;position:relative;height:24px;min-width:0}
.gantt-bar{position:absolute;height:20px;top:2px;border-radius:4px;font-size:9px;color:#fff;font-weight:500;display:flex;align-items:center;padding:0 5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;box-shadow:0 1px 3px rgba(0,0,0,.15);transition:left .3s,width .3s}
.gantt-bar-overdue{position:absolute;height:20px;top:2px;border-radius:0 4px 4px 0;opacity:.35;border:1px dashed}
.gantt-grid-line{position:absolute;top:0;bottom:0;width:1px;background:#f0f0f0}
.gantt-grid-month{position:absolute;top:0;bottom:0;width:1px;background:#ddd}
.legend{display:flex;gap:16px;flex-wrap:wrap;margin-top:16px;padding-top:12px;border-top:1px solid #e8e8e8}
.legend-item{display:flex;align-items:center;gap:4px;font-size:11px}
.legend-dot{width:12px;height:12px;border-radius:3px}
.summary-tbl{width:100%;border-collapse:collapse;font-size:13px;margin-top:8px}
.summary-tbl th{border-bottom:2px solid #1B3A5C;color:#1B3A5C;font-weight:600;padding:8px;text-align:left}
.summary-tbl th:not(:first-child){text-align:center}
.summary-tbl td{padding:8px;border-bottom:1px solid #f0f0f0}
.summary-tbl td:not(:first-child){text-align:center}
.summary-tbl tr:nth-child(even){background:#f8f8f8}
@media(max-width:600px){.sticky-top{flex-direction:column;align-items:flex-start}.tag-counts{margin-top:8px}.matrix-wrap{aspect-ratio:1.3/1;min-height:200px}.port-stats{flex-direction:column}.field-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
<div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
<div style="width:6px;height:32px;background:#2E75B6;border-radius:3px"></div>
<div><h1>Proje sınıflandırma sistemi</h1>
<p class="sub" style="margin-bottom:0">Gartner RGT, HSBC RTB/CTB, Cisco Rapid Risk, Info-Tech, Execution Excellence, TBM/ITFM</p></div></div>
<div class="top-tabs">
<div class="top-tab act" onclick="switchTab(0)">Proje değerlendirme</div>
<div class="top-tab" onclick="switchTab(1)">Portföy görünümü</div>
<div class="top-tab" onclick="switchTab(2)">Kaynak & Gantt</div>
</div>
<div id="page0" class="page act"></div>
<div id="page1" class="page"></div>
<div id="page2" class="page"></div>
</div>
<script>
const questions=[
{id:1,dim:"Stratejik Hizalanma",src:"Gartner RGT",w:20,q:"Bu proje şirketin stratejik hedefleriyle nasıl ilişkileniyor?",opts:[{s:1,l:"Tamamen operasyonel devamlılık — stratejik hedefle bağlantısı yok",t:"RTB"},{s:2,l:"Dolaylı stratejik destek — genel verimlilik artışı sağlıyor",t:"RTB"},{s:3,l:"Mevcut stratejik hedeflerin ölçeklendirilmesine katkı sağlıyor",t:"Grow"},{s:5,l:"Yeni bir stratejik yön veya iş modeli oluşturuyor",t:"Transform"}]},
{id:2,dim:"Değer Önermesi",src:"Gartner RGT / HSBC",w:15,q:"Projenin yarattığı değerin doğası nedir?",opts:[{s:1,l:"Mevcut değeri koruma — yapılmazsa iş aksayacak (KTLO)",t:"RTB"},{s:2,l:"Risk azaltma veya uyumluluk sağlama (yasal, güvenlik)",t:"RTB"},{s:3,l:"Mevcut gelir/verimliliği artırma — aynı müşteri, aynı pazar",t:"Grow"},{s:4,l:"Mevcut müşterilere yeni ürün/hizmet sunma",t:"Grow"},{s:5,l:"Tamamen yeni gelir kaynağı, pazar veya müşteri segmenti yaratma",t:"Transform"}]},
{id:3,dim:"Hedef Pazar ve Müşteri",src:"Gartner Grow vs Transform",w:12,q:"Proje hangi müşteri segmentine ve pazara yönelik?",opts:[{s:1,l:"İç kullanıcılar / operasyonel ekipler",t:"RTB"},{s:2,l:"Mevcut müşteri tabanı — mevcut kanallar",t:"RTB"},{s:3,l:"Mevcut müşteri tabanı — genişletilmiş kanallar",t:"Grow"},{s:4,l:"Mevcut müşteri tabanı — tamamen yeni temas noktası",t:"Grow"},{s:5,l:"Yeni müşteri segmenti veya girilmemiş pazar",t:"Transform"}]},
{id:4,dim:"Teknoloji Olgunluğu",src:"Cisco Rapid Risk",w:10,q:"Teknolojinin olgunluk seviyesi nedir?",opts:[{s:1,l:"Kanıtlanmış — şirkette daha önce uygulanmış",t:"RTB"},{s:2,l:"Bilinen — sektörde yaygın, şirkette ilk",t:"RTB"},{s:3,l:"Olgunlaşmakta — referanslar mevcut",t:"Grow"},{s:4,l:"Yeni nesil — sınırlı referans, POC gerekli",t:"Transform"},{s:5,l:"Deneysel — endüstride yaygın kanıtı yok",t:"Transform"}]},
{id:5,dim:"Organizasyonel Etki",src:"Info-Tech",w:10,q:"Proje kaç birimi etkiliyor?",opts:[{s:1,l:"Tek ekip/fonksiyon içi",t:"RTB"},{s:2,l:"Tek departman/bölüm",t:"RTB"},{s:3,l:"2–3 departman — çapraz koordinasyon",t:"Grow"},{s:4,l:"Şirket geneli — çoğu departman",t:"Transform"},{s:5,l:"Şirket + dış paydaşlar",t:"Transform"}]},
{id:6,dim:"İş Modeli Etkisi",src:"HSBC / Endeavor",w:15,q:"Mevcut iş modelini nasıl etkiliyor?",opts:[{s:1,l:"İş modelinde değişiklik yok — bakım",t:"RTB"},{s:2,l:"Küçük iyileştirme — temel akış aynı",t:"RTB"},{s:3,l:"Verimlilik/kapasite artırma",t:"Grow"},{s:4,l:"Yeni bileşen/kanal ekleme",t:"Grow"},{s:5,l:"Tamamen yeni iş modeli/gelir mekanizması",t:"Transform"}]},
{id:7,dim:"Belirsizlik / Risk",src:"Gartner",w:8,q:"Sonuçlara ilişkin belirsizlik seviyesi?",opts:[{s:1,l:"Öngörülebilir — benzer projeler yapılmış",t:"RTB"},{s:2,l:"Düşük — kapsam net",t:"RTB"},{s:3,l:"Orta — varsayımlar doğrulanmalı",t:"Grow"},{s:4,l:"Yüksek — hipotez doğrulama şart",t:"Transform"},{s:5,l:"Çok yüksek — birden fazla bilinmeyen",t:"Transform"}]},
{id:8,dim:"Başarı Ölçümü",src:"Execution Excellence",w:5,q:"Başarı nasıl ölçülecek?",opts:[{s:1,l:"SLA, uptime, hata sayısı",t:"RTB"},{s:2,l:"Maliyet tasarrufu / risk azaltma (EUR)",t:"RTB"},{s:3,l:"Gelir artışı, cross-sell — gecikmeli göstergeler",t:"Grow"},{s:4,l:"Kullanıcı benimseme, NPS — öncü göstergeler",t:"Transform"},{s:5,l:"Hipotez doğrulama + kill criteria",t:"Transform"}]},
{id:9,dim:"Bütçeleme",src:"Gartner Stage-Gate",w:5,q:"En uygun bütçeleme yaklaşımı?",opts:[{s:1,l:"Yıllık operasyonel bütçe içinde - in house efor",t:"RTB"},{s:2,l:"Sabit bütçe — 3. parti çözüm eforu",t:"RTB"},{s:3,l:"Proje bazlı — business case sonrası",t:"Grow"},{s:4,l:"Aşama bazlı (stage-gate)",t:"Transform"},{s:5,l:"Discovery fonlaması — pivot opsiyonlu",t:"Transform"}]},
{id:10,dim:"Düzenleyici / Uyumluluk",src:"TBM / ITFM",w:0,q:"Düzenleyici veya yasal uyumluluk boyutu var mı?",opts:[{s:-2,l:"Evet — yasal zorunluluk veya düzenleyici son tarih",t:"RTB"},{s:0,l:"Hayır — düzenleyici boyutu yok",t:"—"}]}
];
const UNITS=["Dijital Çözümler","Dijital Dönüşüm","Operasyonel Çözümler","Sistem ve Network"];
const DIRS=["Satış","Pazarlama","Finans","İK","Operasyon","Lojistik","Müşteri Hizmetleri","IT","Üst Yönetim","Diğer"];
const MONTHS_TR=["Oca","Şub","Mar","Nis","May","Haz","Tem","Ağu","Eyl","Eki","Kas","Ara"];

const answers={};
let savedProjects=JSON.parse(localStorage.getItem('pmo_projects3')||'[]');
const TC={RTB:"#548235",Grow:"#C55A11",Transform:"#7030A0"};
const TB={RTB:"#EAF3DE",Grow:"#FAEEDA",Transform:"#EEEDFE"};
const CC={"RTB-1":"#548235","RTB-2":"#6B8E3A","RTB-3":"#C00000","CTB-Grow":"#C55A11","CTB-Transform":"#7030A0","Sınıflandırılmamış":"#888888"};
const CB={"RTB-1":"#EAF3DE","RTB-2":"#EAF3DE","RTB-3":"#FCEBEB","CTB-Grow":"#FAEEDA","CTB-Transform":"#EEEDFE","Sınıflandırılmamış":"#f0f0f0"};
const clsDescs={"RTB-1":"Rutin bakım. Portföye alınır.","RTB-2":"Birim içi iyileştirme. Portföye alınır.","RTB-3":"Çoklu birim etkisi. G3 mini fizibilite.","CTB-Grow":"Mevcut pazarda büyüme. G3 standart fizibilite.","CTB-Transform":"Stratejik dönüşüm. Keşif → MVP → Ölçekleme.","Sınıflandırılmamış":"Henüz sınıflandırılmadı. Soru setini doldurun."};

function persist(){localStorage.setItem('pmo_projects3',JSON.stringify(savedProjects));}
function countTags(){const c={RTB:0,Grow:0,Transform:0};questions.forEach(q=>{if(answers[q.id]!==undefined){const o=q.opts.find(o=>o.s===answers[q.id]);if(o&&o.t&&c[o.t]!==undefined)c[o.t]++;}});return c;}
function classify(ws,q5,q10,tags){
  let adj=ws+(q10||0);const tot=tags.RTB+tags.Grow+tags.Transform;
  if(adj>3.40&&tot>0&&(tags.Grow/tot)>=.65&&tags.Transform<=2)adj=Math.min(adj,3.40);
  if(adj>2.60&&tot>0&&(tags.RTB/tot)>=.65&&tags.Grow<=1)adj=Math.min(adj,2.60);
  if(adj<=2){if((q5||1)<=2)return{cls:"RTB-1",label:"RTB-1 (Rutin)",adj};return{cls:"RTB-2",label:"RTB-2 (Birim İçi)",adj};}
  if(adj<=2.6){if((q5||1)>=3)return{cls:"RTB-3",label:"RTB-3 (Çoklu Birim)",adj};return{cls:"RTB-2",label:"RTB-2 (Birim İçi)",adj};}
  if(adj<=3.4)return{cls:"CTB-Grow",label:"CTB-Grow",adj};
  return{cls:"CTB-Transform",label:"CTB-Transform",adj};
}
function compute(){
  const sc=questions.filter(q=>q.w>0&&answers[q.id]!==undefined);if(!sc.length)return null;
  const wS=sc.reduce((s,q)=>s+answers[q.id]*q.w,0),wT=sc.reduce((s,q)=>s+q.w,0),ws=wS/wT;
  const tags=countTags(),cls=classify(ws,answers[5],answers[10],tags);
  return{score:ws,cls,answered:sc.length,total:questions.filter(q=>q.w>0).length,rawScore:ws,adjScore:cls.adj};
}
function computeAxes(a){const an=a||answers;const xQ=[6,2,3],yQ=[1,4,7];let xS=0,xC=0,yS=0,yC=0;xQ.forEach(id=>{if(an[id]!==undefined){xS+=an[id];xC++;}});yQ.forEach(id=>{if(an[id]!==undefined){yS+=an[id];yC++;}});return{x:xC?xS/xC:null,y:yC?yS/yC:null};}
function matrixZones(){return`<div class="zone" style="left:0;top:66.6%;width:100%;height:33.4%;background:#E8F0E0"><span class="zone-label" style="color:#548235">CORE</span><span class="zone-sub" style="color:#548235">RTB</span></div><div class="zone" style="left:0;top:33.3%;width:100%;height:33.3%;background:#FDF3E0"><span class="zone-label" style="color:#C55A11">ADJACENT</span><span class="zone-sub" style="color:#C55A11">CTB-Grow</span></div><div class="zone" style="left:0;top:0;width:100%;height:33.3%;background:#F0ECFA"><span class="zone-label" style="color:#7030A0">TRANSFORMATIONAL</span><span class="zone-sub" style="color:#7030A0">CTB-Transform</span></div><div style="position:absolute;left:0;right:0;top:33.3%;height:1px;background:rgba(0,0,0,.1)"></div><div style="position:absolute;left:0;right:0;top:66.6%;height:1px;background:rgba(0,0,0,.1)"></div>`;}
function matrixGrid(){let h='';for(let i=1;i<=4;i++){const p=(i/5)*100;h+=`<div class="grid-line grid-line-h" style="top:${100-p}%"></div><div class="grid-line grid-line-v" style="left:${p}%"></div>`;}for(let i=1;i<=5;i++){h+=`<div class="tick" style="bottom:3px;left:${((i-1)/4)*100}%;transform:translateX(-50%)">${i}</div><div class="tick" style="left:3px;bottom:${((i-1)/4)*100}%;transform:translateY(50%)">${i}</div>`;}return h;}
function todayStr(){return new Date().toISOString().slice(0,10);}
function addWeeks(d,w){const r=new Date(d);r.setDate(r.getDate()+w*7);return r.toISOString().slice(0,10);}
function weeksBetween(a,b){return Math.round((new Date(b)-new Date(a))/(7*864e5));}
function parseExcelDate(v){
  if(!v)return"";
  if(typeof v==='number'){const d=new Date((v-25569)*864e5);return d.toISOString().slice(0,10);}
  const s=String(v).trim();
  // DD.MM.YYYY HH:mm or DD.MM.YYYY
  const m=s.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})/);
  if(m)return`${m[3]}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`;
  // YYYY-MM-DD
  const m2=s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(m2)return m2[0];
  // Try Date parse
  const d=new Date(s);
  if(!isNaN(d))return d.toISOString().slice(0,10);
  return"";
}

function resolveClass(v){
  if(!v||v==="-"||v===""||v===null||v===undefined)return"Sınıflandırılmamış";
  const s=String(v).trim();
  const map={"RTB-1":"RTB-1","RTB-2":"RTB-2","RTB-3":"RTB-3","CTB-Grow":"CTB-Grow","CTB-Transform":"CTB-Transform",
    "RTB1":"RTB-1","RTB2":"RTB-2","RTB3":"RTB-3","Grow":"CTB-Grow","Transform":"CTB-Transform",
    "Run":"RTB-1","Core":"RTB-1","Adjacent":"CTB-Grow","Transformational":"CTB-Transform"};
  for(const[k,v2] of Object.entries(map)){if(s.toLowerCase()===k.toLowerCase())return v2;}
  if(s.toLowerCase().includes("rtb"))return"RTB-2";
  if(s.toLowerCase().includes("grow"))return"CTB-Grow";
  if(s.toLowerCase().includes("transform"))return"CTB-Transform";
  return"Sınıflandırılmamış";
}

function importExcel(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.xlsx,.xls';
  inp.onchange=e=>{const f=e.target.files[0];if(!f)return;const rd=new FileReader();rd.onload=ev=>{
    const wb=XLSX.read(ev.target.result,{type:'binary'});
    // Try sheets in order: Liste, Proje Takvimi, first sheet
    const trySheets=["Liste","Proje Takvimi",...wb.SheetNames];
    let imported=0;
    for(const sn of trySheets){
      if(!wb.Sheets[sn])continue;
      const rows=XLSX.utils.sheet_to_json(wb.Sheets[sn],{defval:""});
      if(!rows.length)continue;
      // Detect column mapping from first row keys
      const keys=Object.keys(rows[0]);
      const colMap={
        name: keys.find(k=>/görev\s*ad/i.test(k))||keys.find(k=>k==="Proje")||keys.find(k=>/^proje$/i.test(k))||"Görev Adı",
        unit: keys.find(k=>/takip\s*eden|ilgili\s*it|i̇lgili\s*it|it\s*böl/i.test(k))||"İlgili IT Bölümü",
        dir:  keys.find(k=>/paydaş|talep\s*eden/i.test(k))||keys.find(k=>/direktörlük/i.test(k)&&!/it/i.test(k))||"Talep Eden Direktörlük",
        cls:  keys.find(k=>/dd\s*strateji|odak\s*alan/i.test(k))||keys.find(k=>/deloitte/i.test(k))||keys.find(k=>/sınıf/i.test(k))||"DD Strateji Odak Alanı",
        start:keys.find(k=>/başlangıç/i.test(k))||"Başlangıç",
        end:  keys.find(k=>/bitiş/i.test(k))||keys.find(k=>/planlanan/i.test(k))||"Bitiş Tarihi",
        overdue:keys.find(k=>/overdue/i.test(k))||"Overdue Bitiş",
        week: keys.find(k=>/^hafta$/i.test(k))||"Hafta",
        leader:keys.find(k=>/lider/i.test(k))||keys.find(k=>/atanan/i.test(k))||"Proje Lideri",
        no:   keys.find(k=>/proje\s*no/i.test(k))||"Proje No",
        people:keys.find(k=>/kaynak/i.test(k))||"Kaynak_Kişi",
      };
      rows.forEach(r=>{
        const name=r[colMap.name];
        if(!name||String(name).trim()===""||name==="Proje")return; // skip empty and header
        // Skip parent/category rows: no dir and no decimal in project no
        const pno=r[colMap.no];
        const dir=r[colMap.dir];
        if(pno!==undefined&&pno!==""&&!String(pno).includes(".")&&(!dir||dir===""||dir==="None"))return;
        const startD=parseExcelDate(r[colMap.start]);
        const endD=parseExcelDate(r[colMap.end]);
        const overdueD=parseExcelDate(r[colMap.overdue]);
        const cls=resolveClass(r[colMap.cls]);
        const dur=r[colMap.week]?parseInt(r[colMap.week]):((startD&&endD)?Math.max(1,weeksBetween(startD,endD)):4);
        savedProjects.push({
          name:String(name).trim(),
          score:0,rawScore:0,cls:cls,label:cls,x:null,y:null,answers:{},
          date:todayStr(),duration:dur,
          unit:r[colMap.unit]||"",
          dir:String(dir||"").trim(),
          people:parseInt(r[colMap.people])||1,
          leader:r[colMap.leader]||"",
          startDate:startD||todayStr(),
          endDate:endD||addWeeks(startD||todayStr(),4),
          overdueDate:overdueD||"",
          priority:imported
        });
        imported++;
      });
      if(imported>0)break; // found data, stop trying other sheets
    }
    persist();alert(`${imported} proje yüklendi.`);renderPortfolio();renderGantt();
  };rd.readAsBinaryString(f);};inp.click();
}

function saveProject(){
  const nm=document.getElementById('proj-name').value.trim();if(!nm){alert('Proje adı gerekli.');return;}
  const res=compute();
  const unit=document.getElementById('proj-unit').value;
  const dir=document.getElementById('proj-dir').value;
  const ppl=parseInt(document.getElementById('proj-ppl').value)||2;
  const startDate=document.getElementById('proj-start').value||todayStr();
  const endDate=document.getElementById('proj-end').value||addWeeks(startDate,8);
  const dur=Math.max(1,weeksBetween(startDate,endDate));
  const axes=res?computeAxes():({x:null,y:null});
  const clsResult=res?res.cls:{cls:"Sınıflandırılmamış",label:"Sınıflandırılmamış",adj:0};
  savedProjects.push({name:nm,score:res?res.adjScore:0,rawScore:res?res.rawScore:0,cls:clsResult.cls,label:clsResult.label,x:axes.x,y:axes.y,answers:{...answers},date:todayStr(),duration:dur,unit,dir,people:ppl,startDate,endDate,overdueDate:"",priority:savedProjects.filter(p=>p.unit===unit).length});
  persist();

  const msg=document.getElementById('save-msg');if(msg){msg.textContent=`"${nm}" kaydedildi`;msg.style.display='inline';setTimeout(()=>msg.style.display='none',2500);}
  Object.keys(answers).forEach(k=>delete answers[k]);render();
}
function deleteProject(i){if(!confirm(`"${savedProjects[i].name}" silinecek?`))return;savedProjects.splice(i,1);persist();renderPortfolio();}
function changeClass(i,cls){savedProjects[i].cls=cls;savedProjects[i].label=cls;persist();renderPortfolio();}

function exportExcel(){

  if(res&&res.answered>=5){const tot=tags.RTB+tags.Grow+tags.Transform;if(tot>0&&Math.abs(res.rawScore-res.adjScore)>.01){const gP=tags.Grow/tot,rP=tags.RTB/tot,dom=gP>=.65?"Grow":rP>=.65?"RTB":"";if(dom)h+=`<div class="warn-box" style="background:#FFF8F0;border-color:#C55A11;color:#C55A11"><strong>Düzeltme:</strong> Ham skor ${res.rawScore.toFixed(2)} → ${res.adjScore.toFixed(2)} (cevapların %${Math.round((dom==="Grow"?gP:rP)*100)}'${dom==="Grow"?"i":"ü"} ${dom})</div>`;}}

  });
  h+=`</div>`;el.innerHTML=h;
  const cv=document.getElementById('pie-chart');if(cv){if(pieChart)pieChart.destroy();const lbs=Object.keys(clsC).filter(k=>clsC[k]>0),dt=lbs.map(k=>clsC[k]),cls=lbs.map(k=>CC[k]);pieChart=new Chart(cv,{type:'doughnut',data:{labels:lbs.map(k=>`${k}: %${(clsC[k]/tP*100).toFixed(0)}`),datasets:[{data:dt,backgroundColor:cls,borderWidth:2,borderColor:'#fff'}]},options:{responsive:true,maintainAspectRatio:true,plugins:{legend:{position:'bottom',labels:{font:{size:12},padding:12,usePointStyle:true}}}}});}
}
function showTip(e,i){const p=savedProjects[i];if(!p)return;const t=document.getElementById('scatter-tip'),m=document.getElementById('scatter-matrix'),r=m.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;t.innerHTML=`<div style="font-weight:600">${p.name}</div><div style="display:inline-block;padding:1px 6px;border-radius:8px;font-size:10px;font-weight:600;background:${CB[p.cls]||"#f0f0f0"};color:${CC[p.cls]||"#999"}">${p.cls}</div><div style="margin-top:4px;color:#888">${p.unit||""} · ${p.dir||""}<br>${p.startDate||""} → ${p.endDate||""} · ${p.people||0} kişi</div>`;t.style.left=(mx>r.width*.6?(mx-230):(mx+20))+'px';t.style.top=(my-10)+'px';t.classList.add('vis');}
function hideTip(){document.getElementById('scatter-tip')?.classList.remove('vis');}

// ============ TAB 3: GANTT ============
function renderGantt(){
  const el=document.getElementById('page2'),P=savedProjects;
  if(!P.length){el.innerHTML=`<div class="empty-port"><p style="font-size:40px;opacity:.3;margin-bottom:12px">📅</p><p>Gantt görünümü için proje kaydedin.</p><div style="margin-top:20px"><button class="xls-btn" onclick="importExcel()" style="font-size:14px;padding:10px 24px">📤 Excel'den yükle</button></div></div>`;return;}
  let minD=null,maxD=null;
  P.forEach(p=>{const s=p.startDate?new Date(p.startDate):null;const e=p.overdueDate?new Date(p.overdueDate):(p.endDate?new Date(p.endDate):null);if(s&&(!minD||s<minD))minD=s;if(e&&(!maxD||e>maxD))maxD=e;});
  if(!minD)minD=new Date();if(!maxD)maxD=new Date(minD.getTime()+180*864e5);
  minD=new Date(minD.getFullYear(),minD.getMonth(),1);
  maxD=new Date(maxD.getFullYear(),maxD.getMonth()+2,0);
  const totalDays=(maxD-minD)/864e5;
  const months=[];let cur=new Date(minD);
  while(cur<=maxD){months.push({y:cur.getFullYear(),m:cur.getMonth()});cur=new Date(cur.getFullYear(),cur.getMonth()+1,1);}
  const MW=130,LW=190,totalW=months.length*MW;
  const units={};P.forEach((p,i)=>{const u=p.unit||"Atanmamış";if(!units[u])units[u]=[];units[u].push({...p,idx:i});});

  let h=`<div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap"><button class="xls-btn" onclick="exportExcel()">📥 Excel'e aktar</button><button class="xls-btn" onclick="importExcel()">📤 Excel'den yükle</button></div>`;

  Object.keys(units).sort().forEach(unitName=>{
    const projs=units[unitName];const tPpl=projs.reduce((s,p)=>s+(p.people||1),0);
    h+=`<div class="gantt-wrap"><div class="gantt-unit-title"><span>📁 ${unitName}</span><span class="res">${projs.length} proje · ${tPpl} kişi</span></div>`;
    h+=`<div style="overflow-x:auto;border:1px solid #e8e8e8;border-radius:8px;margin-top:8px">`;
    // === HEADER ===
    h+=`<div style="display:flex;min-width:${LW+totalW}px">`;
    h+=`<div style="width:${LW}px;min-width:${LW}px;position:sticky;left:0;z-index:2;background:#f8f8f8;border-right:2px solid #ddd">`;
    h+=`<div style="height:26px;display:flex;align-items:center;padding:0 8px;font-size:11px;font-weight:600;color:#1B3A5C;border-bottom:1px solid #ddd">Proje</div>`;
    h+=`<div style="height:18px;border-bottom:1px solid #e0e0e0"></div></div>`;
    h+=`<div style="display:flex;min-width:${totalW}px;flex-direction:column">`;
    // Month names
    h+=`<div style="display:flex;height:26px;border-bottom:1px solid #ddd">`;
    months.forEach((m,i)=>{h+=`<div style="width:${MW}px;min-width:${MW}px;text-align:center;font-size:11px;font-weight:600;color:#1B3A5C;display:flex;align-items:center;justify-content:center;background:#f8f8f8;${i?'border-left:1px solid #ccc':''}">${MONTHS_TR[m.m]} ${String(m.y).slice(2)}</div>`;});
    h+=`</div>`;
    // Week subdivisions
    h+=`<div style="display:flex;height:18px;border-bottom:1px solid #e0e0e0">`;
    months.forEach((m,mi)=>{for(let w=0;w<4;w++){h+=`<div style="width:${MW/4}px;min-width:${MW/4}px;text-align:center;font-size:8px;color:#aaa;display:flex;align-items:center;justify-content:center;${w===0&&mi>0?'border-left:1px solid #ccc':w>0?'border-left:1px solid #f0f0f0':''};background:#fcfcfc">H${w+1}</div>`;}});
    h+=`</div></div></div>`;
    // === ROWS ===
    projs.forEach(p=>{
      const pS=p.startDate?new Date(p.startDate):minD;
      const pE=p.endDate?new Date(p.endDate):new Date(pS.getTime()+28*864e5);
      const pO=p.overdueDate?new Date(p.overdueDate):null;
      const sPx=Math.max(0,(pS-minD)/864e5/totalDays*totalW);
      const ePx=Math.max(0,(pE-minD)/864e5/totalDays*totalW);
      const bW=Math.max(10,ePx-sPx);
      const c=CC[p.cls]||"#888";
      h+=`<div style="display:flex;min-width:${LW+totalW}px;min-height:28px;align-items:center;border-bottom:1px solid #f5f5f5">`;
      h+=`<div style="width:${LW}px;min-width:${LW}px;padding:2px 8px;font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;position:sticky;left:0;background:#fff;z-index:1;border-right:2px solid #ddd" title="${p.name}">${p.name}</div>`;
      h+=`<div style="min-width:${totalW}px;position:relative;height:24px">`;
      // Month grid
      months.forEach((m,mi)=>{if(mi>0)h+=`<div style="position:absolute;top:0;bottom:0;left:${mi*MW}px;width:1px;background:#e8e8e8"></div>`;
        for(let w=1;w<4;w++)h+=`<div style="position:absolute;top:0;bottom:0;left:${mi*MW+w*MW/4}px;width:1px;background:#f5f5f5"></div>`;});
      h+=`<div style="position:absolute;left:${sPx}px;width:${bW}px;height:20px;top:2px;border-radius:4px;background:${c};color:#fff;font-size:9px;font-weight:500;display:flex;align-items:center;padding:0 5px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;box-shadow:0 1px 3px rgba(0,0,0,.15)" title="${p.name}: ${p.startDate||''} → ${p.endDate||''}">${bW>70?p.name:''}</div>`;
      if(pO&&pO>pE){const oP=(pO-minD)/864e5/totalDays*totalW;h+=`<div style="position:absolute;left:${ePx}px;width:${Math.max(4,oP-ePx)}px;height:20px;top:2px;border-radius:0 4px 4px 0;background:${c};opacity:.3;border:1px dashed ${c}" title="Overdue → ${p.overdueDate}"></div>`;}
      h+=`</div></div>`;
    });
    h+=`</div></div>`;
  });

  // Legend
  h+=`<div class="gantt-wrap"><div class="legend" style="margin:0;padding:0;border:none">`;
  [["RTB-1","#548235"],["RTB-2","#6B8E3A"],["RTB-3","#C00000"],["CTB-Grow","#C55A11"],["CTB-Transform","#7030A0"],["Sınıflandırılmamış","#888"]].forEach(([l,c])=>{h+=`<div class="legend-item"><div class="legend-dot" style="background:${c}"></div>${l}</div>`;});
  h+=`<div class="legend-item"><div style="width:20px;height:12px;border-radius:0 3px 3px 0;opacity:.35;background:#888;border:1px dashed #888"></div>Overdue</div></div></div>`;

  // Summary
  h+=`<div class="gantt-wrap"><h3>Birim bazlı özet</h3><table class="summary-tbl"><tr><th>Birim</th><th>Proje</th><th>Toplam hafta</th><th>Kaynak</th></tr>`;
  Object.keys(units).sort().forEach(u=>{const a=units[u];h+=`<tr><td>${u}</td><td>${a.length}</td><td>${a.reduce((s,p)=>s+(p.duration||4),0)}</td><td>${a.reduce((s,p)=>s+(p.people||1),0)}</td></tr>`;});
  h+=`</table></div>`;
  el.innerHTML=h;
}

render();
</script>
</body>
