<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proje Sınıflandırma &amp; Portföy Görünümü</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f5f5;color:#2c2c2a;line-height:1.6}
.wrap{max-width:820px;margin:0 auto;padding:20px}
h1{font-size:22px;font-weight:600;color:#1B3A5C;margin-bottom:4px}
.sub{font-size:13px;color:#888;margin-bottom:16px}

/* Top tabs */
.top-tabs{display:flex;gap:0;margin-bottom:20px;border-bottom:2px solid #e0e0e0}
.top-tab{flex:1;padding:12px 16px;text-align:center;cursor:pointer;font-size:14px;font-weight:500;color:#888;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .2s}
.top-tab.act{color:#1B3A5C;border-bottom-color:#2E75B6}
.top-tab:hover{color:#1B3A5C}
.page{display:none}
.page.act{display:block}

/* Sticky panel */
.sticky{position:sticky;top:0;z-index:10;background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:16px 18px;margin-bottom:20px;box-shadow:0 2px 12px rgba(0,0,0,.08)}
.sticky-top{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:12px}
.score-block{display:flex;gap:16px;align-items:center}
.score-num{font-size:28px;font-weight:600}
.score-label{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.5px}
.divider{width:1px;height:36px;background:#e0e0e0}
.badge{display:inline-block;padding:3px 12px;border-radius:20px;font-size:14px;font-weight:600}
.tag-counts{display:flex;gap:12px}
.tag-count{text-align:center;min-width:50px}
.tag-count .num{font-size:20px;font-weight:600}
.tag-count .lbl{font-size:10px;color:#888}

/* Save bar */
.save-bar{display:flex;gap:8px;align-items:center;margin-top:12px;padding-top:12px;border-top:1px solid #e8e8e8}
.save-bar input{flex:1;padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;outline:none}
.save-bar input:focus{border-color:#2E75B6}
.save-btn{padding:8px 20px;border:none;border-radius:8px;background:#2E75B6;color:#fff;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap}
.save-btn:hover{background:#185FA5}
.save-btn:disabled{background:#ccc;cursor:not-allowed}
.save-msg{font-size:12px;color:#548235;display:none}

/* Matrix */
.matrix-outer{margin-bottom:16px}
.matrix-wrap{position:relative;width:100%;aspect-ratio:1.6/1;min-height:240px;background:#fff;border-radius:10px;border:1px solid #e8e8e8;overflow:hidden;margin-left:28px;margin-top:4px}
.y-label{position:absolute;left:0;top:50%;transform:rotate(-90deg) translateX(-50%);transform-origin:left center;white-space:nowrap;font-size:10px;font-weight:600;color:#888;letter-spacing:.3px}
.x-label-row{display:flex;justify-content:space-between;align-items:center;padding:6px 4px 0 32px;font-size:10px;color:#aaa}
.zone{position:absolute;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:2px}
.zone-label{font-size:12px;font-weight:700;letter-spacing:.5px;opacity:.6}
.zone-sub{font-size:10px;opacity:.4;text-align:center}
.dot{position:absolute;width:20px;height:20px;border-radius:50%;border:3px solid #fff;box-shadow:0 2px 10px rgba(0,0,0,.3);transition:left .5s,top .5s,background .3s;z-index:5}
.dot-label{position:absolute;font-size:11px;font-weight:600;color:#1B3A5C;white-space:nowrap;transition:left .5s,top .5s;z-index:5;background:rgba(255,255,255,.92);padding:2px 8px;border-radius:4px;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.crosshair-h,.crosshair-v{position:absolute;transition:left .5s,top .5s;z-index:3}
.crosshair-h{height:1px;left:0;right:0;background:rgba(0,0,0,.08)}
.crosshair-v{width:1px;top:0;bottom:0;background:rgba(0,0,0,.08)}
.grid-line{position:absolute;background:rgba(0,0,0,.04)}
.grid-line-h{height:1px;left:0;right:0}
.grid-line-v{width:1px;top:0;bottom:0}
.tick{position:absolute;font-size:8px;color:#bbb;font-weight:500}
.empty-hint{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:4;font-size:13px;color:#bbb}
.empty-hint span{background:rgba(255,255,255,.8);padding:6px 16px;border-radius:8px}

/* Scatter dots */
.scatter-dot{position:absolute;width:14px;height:14px;border-radius:50%;border:2px solid #fff;box-shadow:0 1px 6px rgba(0,0,0,.25);z-index:5;cursor:pointer;transition:transform .15s}
.scatter-dot:hover{transform:scale(1.4);z-index:10}
.scatter-tooltip{display:none;position:absolute;z-index:20;background:#fff;border:1px solid #ddd;border-radius:8px;padding:8px 12px;box-shadow:0 4px 16px rgba(0,0,0,.15);font-size:12px;line-height:1.5;max-width:220px;pointer-events:none}
.scatter-tooltip.vis{display:block}

/* Results, progress, etc */
.result-desc{padding:10px 14px;border-radius:8px;font-size:13px;line-height:1.5;margin-bottom:8px}
.warn-box{padding:8px 14px;border-radius:8px;font-size:12px;line-height:1.5;margin-bottom:8px;border:1px dashed}
.progress-bar{height:4px;background:#e0e0e0;border-radius:2px;overflow:hidden}
.progress-fill{height:4px;border-radius:2px;transition:width .3s}
.progress-text{font-size:11px;color:#999;margin-top:4px}

/* Question cards */
.q-card{border:1px solid #e0e0e0;border-radius:12px;padding:16px;margin-bottom:14px;background:#fff;transition:background .2s}
.q-card.answered{background:#fafafa}
.q-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;flex-wrap:wrap;gap:6px}
.q-header-left{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.q-num{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;font-size:12px;font-weight:600;color:#fff;background:#b0b0b0;transition:background .2s}
.q-num.active{background:#2E75B6}
.q-dim{font-size:11px;color:#888;border:1px solid #e0e0e0;padding:1px 8px;border-radius:4px}
.q-weight{font-size:11px;color:#888}
.q-src{font-size:10px;color:#aaa;font-style:italic}
.q-text{font-size:14px;font-weight:600;color:#1B3A5C;margin:8px 0 12px;line-height:1.5}
.opt-btn{display:flex;align-items:center;gap:10px;width:100%;padding:9px 14px;border:1px solid #e0e0e0;border-radius:8px;background:#fff;cursor:pointer;text-align:left;font-size:13px;color:#2c2c2a;line-height:1.4;margin-bottom:5px;transition:all .15s}
.opt-btn:hover{background:#f8f8f8}
.opt-btn.sel{border-width:2px}
.radio{flex-shrink:0;width:18px;height:18px;border-radius:50%;border:2px solid #ccc;display:flex;align-items:center;justify-content:center}
.radio .rdot{width:8px;height:8px;border-radius:50%;display:none}
.opt-btn.sel .radio .rdot{display:block}
.opt-label{flex:1}
.opt-tag{flex-shrink:0;font-size:10px;padding:2px 7px;border-radius:4px;font-weight:600}
.reset-btn{display:block;margin:16px auto;padding:8px 24px;border-radius:8px;border:1px solid #ccc;background:#fff;color:#888;cursor:pointer;font-size:13px}
.reset-btn:hover{background:#f0f0f0}
.footer{margin-top:20px;padding:12px 16px;background:#f0f0f0;border-radius:8px;font-size:11px;color:#888;line-height:1.7}
.footer strong{color:#666}

/* Portfolio page */
.port-stats{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.stat-card{flex:1;min-width:100px;background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:14px;text-align:center}
.stat-card .num{font-size:28px;font-weight:600}
.stat-card .lbl{font-size:11px;color:#888;margin-top:2px}
.chart-row{display:flex;gap:20px;margin-top:20px;flex-wrap:wrap}
.chart-col{flex:1;min-width:280px;background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:16px}
.chart-col h3{font-size:16px;font-weight:500;color:#1B3A5C;margin-bottom:12px}
.proj-list{margin-top:20px;background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:16px}
.proj-list h3{font-size:16px;font-weight:500;color:#1B3A5C;margin-bottom:12px}
.proj-row{display:flex;align-items:center;padding:8px 12px;border-bottom:1px solid #f0f0f0;gap:12px;font-size:13px}
.proj-row:last-child{border-bottom:none}
.proj-row .pname{flex:1;font-weight:500}
.proj-row .pbadge{padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600}
.proj-row .pscore{font-size:12px;color:#888;min-width:60px;text-align:right}
.proj-row .pdel{cursor:pointer;color:#ccc;font-size:16px;padding:4px 8px;border-radius:4px}
.proj-row .pdel:hover{color:#C00000;background:#FEF5F5}
.empty-port{text-align:center;padding:60px 20px;color:#bbb;font-size:14px}
@media(max-width:600px){.sticky-top{flex-direction:column;align-items:flex-start}.tag-counts{margin-top:8px}.matrix-wrap{aspect-ratio:1.4/1;min-height:200px}.chart-row{flex-direction:column}.port-stats{flex-direction:column}}
</style>
</head>
<body>
<div class="wrap">
<div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
<div style="width:6px;height:32px;background:#2E75B6;border-radius:3px"></div>
<div><h1>Proje sınıflandırma sistemi</h1>
<p class="sub" style="margin-bottom:0">Gartner RGT, HSBC RTB/CTB, Cisco Rapid Risk, Info-Tech, Execution Excellence, TBM/ITFM</p></div></div>

<div class="top-tabs">
<div class="top-tab act" onclick="switchTab(0)">Proje değerlendirme</div>
<div class="top-tab" onclick="switchTab(1)">Portföy görünümü</div>
</div>

<div id="page0" class="page act"></div>
<div id="page1" class="page"></div>
</div>

<script>
const questions=[
{id:1,dim:"Stratejik Hizalanma",src:"Gartner RGT",w:20,q:"Bu proje şirketin stratejik hedefleriyle nasıl ilişkileniyor?",opts:[
{s:1,l:"Tamamen operasyonel devamlılık — stratejik hedefle bağlantısı yok",t:"RTB"},
{s:2,l:"Dolaylı stratejik destek — genel verimlilik artışı sağlıyor",t:"RTB"},
{s:3,l:"Mevcut stratejik hedeflerin ölçeklendirilmesine katkı sağlıyor",t:"Grow"},
{s:5,l:"Yeni bir stratejik yön veya iş modeli oluşturuyor",t:"Transform"}]},
{id:2,dim:"Değer Önermesi",src:"Gartner RGT / HSBC",w:15,q:"Projenin yarattığı değerin doğası nedir?",opts:[
{s:1,l:"Mevcut değeri koruma — yapılmazsa iş aksayacak (KTLO)",t:"RTB"},
{s:2,l:"Risk azaltma veya uyumluluk sağlama (yasal, güvenlik)",t:"RTB"},
{s:3,l:"Mevcut gelir/verimliliği artırma — aynı müşteri, aynı pazar",t:"Grow"},
{s:4,l:"Mevcut müşterilere yeni ürün/hizmet sunma",t:"Grow"},
{s:5,l:"Tamamen yeni gelir kaynağı, pazar veya müşteri segmenti yaratma",t:"Transform"}]},
{id:3,dim:"Hedef Pazar ve Müşteri",src:"Gartner Grow vs Transform",w:12,q:"Proje hangi müşteri segmentine ve pazara yönelik?",opts:[
{s:1,l:"İç kullanıcılar / operasyonel ekipler",t:"RTB"},
{s:2,l:"Mevcut müşteri tabanı — mevcut kanallar üzerinden",t:"RTB"},
{s:3,l:"Mevcut müşteri tabanı — genişletilmiş kanallar",t:"Grow"},
{s:4,l:"Mevcut müşteri tabanı — tamamen yeni temas noktası",t:"Grow"},
{s:5,l:"Yeni müşteri segmenti veya henüz girilmemiş pazar",t:"Transform"}]},
{id:4,dim:"Teknoloji Olgunluğu",src:"Cisco Rapid Risk",w:10,q:"Projede kullanılacak teknolojinin olgunluk seviyesi nedir?",opts:[
{s:1,l:"Kanıtlanmış teknoloji — şirkette daha önce uygulanmış",t:"RTB"},
{s:2,l:"Bilinen teknoloji — sektörde yaygın, şirkette ilk kez",t:"RTB"},
{s:3,l:"Olgunlaşmakta olan teknoloji — referanslar mevcut",t:"Grow"},
{s:4,l:"Yeni nesil teknoloji — sınırlı referans, POC gerekli",t:"Transform"},
{s:5,l:"Deneysel teknoloji — endüstride yaygın kanıtı yok",t:"Transform"}]},
{id:5,dim:"Organizasyonel Etki",src:"Info-Tech",w:10,q:"Proje organizasyonda kaç birimi etkiliyor?",opts:[
{s:1,l:"Tek bir ekip veya fonksiyon içi",t:"RTB"},
{s:2,l:"Tek bir departman/bölüm",t:"RTB"},
{s:3,l:"2–3 departman — çapraz fonksiyonel koordinasyon",t:"Grow"},
{s:4,l:"Şirket geneli — çoğu departmanı etkiliyor",t:"Transform"},
{s:5,l:"Şirket + dış paydaşlar (bayiler, OEM, müşteriler)",t:"Transform"}]},
{id:6,dim:"İş Modeli Etkisi",src:"HSBC / Endeavor",w:15,q:"Proje mevcut iş modelini nasıl etkiliyor?",opts:[
{s:1,l:"İş modelinde değişiklik yok — mevcut süreçlerin bakımı",t:"RTB"},
{s:2,l:"Mevcut süreçlerde küçük iyileştirme — temel akış aynı",t:"RTB"},
{s:3,l:"Mevcut iş modelinin verimliliğini/kapasitesini artırma",t:"Grow"},
{s:4,l:"Mevcut iş modeline yeni bir bileşen/kanal ekleme",t:"Grow"},
{s:5,l:"Tamamen yeni bir iş modeli veya gelir mekanizması",t:"Transform"}]},
{id:7,dim:"Belirsizlik / Risk",src:"Gartner",w:8,q:"Projenin sonuçlarına ilişkin belirsizlik seviyesi nedir?",opts:[
{s:1,l:"Sonuç öngörülebilir — benzer projeler başarıyla yapılmış",t:"RTB"},
{s:2,l:"Düşük belirsizlik — kapsam net, riskler yönetilebilir",t:"RTB"},
{s:3,l:"Orta belirsizlik — bazı varsayımlar doğrulanmaya muhtaç",t:"Grow"},
{s:4,l:"Yüksek belirsizlik — hipotez doğrulama şart",t:"Transform"},
{s:5,l:"Çok yüksek belirsizlik — birden fazla bilinmeyen",t:"Transform"}]},
{id:8,dim:"Başarı Ölçümü",src:"Execution Excellence",w:5,q:"Projenin başarısı nasıl ölçülecek?",opts:[
{s:1,l:"SLA, uptime, hata sayısı — süreç akışı metrikleri",t:"RTB"},
{s:2,l:"Maliyet tasarrufu veya risk azaltma miktarı (EUR)",t:"RTB"},
{s:3,l:"Gelir artışı, cross-sell — gecikmeli göstergeler",t:"Grow"},
{s:4,l:"Kullanıcı benimseme, NPS — öncü göstergeler",t:"Transform"},
{s:5,l:"Hipotez doğrulama + kill criteria (Go/No-Go)",t:"Transform"}]},
{id:9,dim:"Bütçeleme Modeli",src:"Gartner Stage-Gate",w:5,q:"Proje için en uygun bütçeleme yaklaşımı?",opts:[
{s:1,l:"Yıllık operasyonel bütçe içinde",t:"RTB"},
{s:2,l:"Sabit bütçe — kapsam ve maliyet baştan belirli",t:"RTB"},
{s:3,l:"Proje bazlı — business case sonrası tahsis",t:"Grow"},
{s:4,l:"Aşama bazlı (stage-gate) — faz başına onay",t:"Transform"},
{s:5,l:"Discovery fonlaması — küçük başlangıç, pivot opsiyonu",t:"Transform"}]},
{id:10,dim:"Düzenleyici / Uyumluluk",src:"TBM / ITFM",w:0,q:"Projenin düzenleyici veya yasal uyumluluk boyutu var mı?",opts:[
{s:-2,l:"Evet — yasal zorunluluk veya düzenleyici son tarih",t:"RTB"},
{s:0,l:"Hayır — düzenleyici boyutu yok",t:"—"}]}
];

const answers={};
let savedProjects=JSON.parse(localStorage.getItem('pmo_projects')||'[]');
const TC={RTB:"#548235",Grow:"#C55A11",Transform:"#7030A0"};
const TB={RTB:"#EAF3DE",Grow:"#FAEEDA",Transform:"#EEEDFE"};
const clsColors={"RTB-1":"#548235","RTB-2":"#548235","RTB-3":"#C00000","CTB-Grow":"#C55A11","CTB-Transform":"#7030A0"};
const clsBg={"RTB-1":"#EAF3DE","RTB-2":"#EAF3DE","RTB-3":"#FCEBEB","CTB-Grow":"#FAEEDA","CTB-Transform":"#EEEDFE"};

function countTags(){const c={RTB:0,Grow:0,Transform:0};questions.forEach(q=>{if(answers[q.id]!==undefined){const o=q.opts.find(o=>o.s===answers[q.id]);if(o&&o.t&&c[o.t]!==undefined)c[o.t]++;}});return c;}

function classify(ws,q5,q10,tags){
  let adj=ws+(q10||0);
  const tot=tags.RTB+tags.Grow+tags.Transform;
  if(adj>3.40&&tot>0&&(tags.Grow/tot)>=0.65&&tags.Transform<=2)adj=Math.min(adj,3.40);
  if(adj>2.60&&tot>0&&(tags.RTB/tot)>=0.65&&tags.Grow<=1)adj=Math.min(adj,2.60);
  if(adj<=2.0){if((q5||1)<=2)return{cls:"RTB-1",label:"RTB-1 (Rutin)",adj};return{cls:"RTB-2",label:"RTB-2 (Birim İçi)",adj};}
  if(adj<=2.6){if((q5||1)>=3)return{cls:"RTB-3",label:"RTB-3 (Çoklu Birim)",adj};return{cls:"RTB-2",label:"RTB-2 (Birim İçi)",adj};}
  if(adj<=3.4)return{cls:"CTB-Grow",label:"CTB-Grow",adj};
  return{cls:"CTB-Transform",label:"CTB-Transform",adj};
}

function compute(){
  const sc=questions.filter(q=>q.w>0&&answers[q.id]!==undefined);
  if(!sc.length)return null;
  const wS=sc.reduce((s,q)=>s+answers[q.id]*q.w,0);
  const wT=sc.reduce((s,q)=>s+q.w,0);
  const ws=wS/wT;const tags=countTags();const cls=classify(ws,answers[5],answers[10],tags);
  return{score:ws,cls,answered:sc.length,total:questions.filter(q=>q.w>0).length,rawScore:ws,adjScore:cls.adj};
}

function computeAxes(ans){
  const a=ans||answers;const xQ=[6,2,3],yQ=[1,4,7];
  let xS=0,xC=0,yS=0,yC=0;
  xQ.forEach(id=>{if(a[id]!==undefined){xS+=a[id];xC++;}});
  yQ.forEach(id=>{if(a[id]!==undefined){yS+=a[id];yC++;}});
  return{x:xC?xS/xC:null,y:yC?yS/yC:null};
}

function matrixZones(){
  return `<div class="zone" style="left:0;top:66.6%;width:100%;height:33.4%;background:#E8F0E0"><span class="zone-label" style="color:#548235">CORE</span><span class="zone-sub" style="color:#548235">RTB-1 / RTB-2 / RTB-3</span></div>
  <div class="zone" style="left:0;top:33.3%;width:100%;height:33.3%;background:#FDF3E0"><span class="zone-label" style="color:#C55A11">ADJACENT</span><span class="zone-sub" style="color:#C55A11">CTB-Grow</span></div>
  <div class="zone" style="left:0;top:0;width:100%;height:33.3%;background:#F0ECFA"><span class="zone-label" style="color:#7030A0">TRANSFORMATIONAL</span><span class="zone-sub" style="color:#7030A0">CTB-Transform</span></div>
  <div style="position:absolute;left:0;right:0;top:33.3%;height:1px;background:rgba(0,0,0,.1)"></div>
  <div style="position:absolute;left:0;right:0;top:66.6%;height:1px;background:rgba(0,0,0,.1)"></div>`;
}
function matrixGrid(){
  let h='';for(let i=1;i<=4;i++){const p=(i/5)*100;h+=`<div class="grid-line grid-line-h" style="top:${100-p}%"></div><div class="grid-line grid-line-v" style="left:${p}%"></div>`;}
  for(let i=1;i<=5;i++){h+=`<div class="tick" style="bottom:3px;left:${((i-1)/4)*100}%;transform:translateX(-50%)">${i}</div><div class="tick" style="left:3px;bottom:${((i-1)/4)*100}%;transform:translateY(50%)">${i}</div>`;}
  return h;
}

function saveProject(){
  const nameInput=document.getElementById('proj-name');
  const name=nameInput.value.trim();
  if(!name)return;
  const res=compute();if(!res||res.answered<9)return;
  const axes=computeAxes();
  const proj={name,score:res.adjScore,rawScore:res.rawScore,cls:res.cls.cls,label:res.cls.label,x:axes.x,y:axes.y,answers:{...answers},date:new Date().toISOString().slice(0,10)};
  savedProjects.push(proj);
  localStorage.setItem('pmo_projects',JSON.stringify(savedProjects));
  nameInput.value='';
  const msg=document.getElementById('save-msg');msg.style.display='inline';msg.textContent=`"${name}" kaydedildi`;
  setTimeout(()=>{msg.style.display='none';},2500);
  Object.keys(answers).forEach(k=>delete answers[k]);
  render();
}

function deleteProject(idx){
  if(!confirm(`"${savedProjects[idx].name}" silinecek. Emin misiniz?`))return;
  savedProjects.splice(idx,1);
  localStorage.setItem('pmo_projects',JSON.stringify(savedProjects));
  renderPortfolio();
}

function switchTab(n){
  document.querySelectorAll('.top-tab').forEach((t,i)=>t.classList.toggle('act',i===n));
  document.querySelectorAll('.page').forEach((p,i)=>p.classList.toggle('act',i===n));
  if(n===1)renderPortfolio();
}

// ============ RENDER PAGE 1 (SCORING) ============
function render(){
  const res=compute();const tags=countTags();const el=document.getElementById('page0');
  let h='';

  // Sticky
  h+=`<div class="sticky"><div class="sticky-top"><div class="score-block">`;
  if(res&&res.answered>0){
    const c=clsColors[res.cls.cls]||"#999",bg=clsBg[res.cls.cls]||"#f0f0f0";
    const showAdj=Math.abs(res.rawScore-res.adjScore)>0.01;
    h+=`<div><div class="score-label">Ağırlıklı skor${showAdj?" (düzeltilmiş)":""}</div><div class="score-num" style="color:${c}">${res.adjScore.toFixed(2)}</div>${showAdj?`<div style="font-size:10px;color:#aaa;text-decoration:line-through">${res.rawScore.toFixed(2)}</div>`:""}</div>
      <div class="divider"></div><div><div class="score-label">Sınıflandırma</div><div class="badge" style="background:${bg};color:${c}">${res.cls.label}</div></div>`;
  }else{
    h+=`<div><div class="score-label">Ağırlıklı skor</div><div class="score-num" style="color:#ccc">—</div></div><div class="divider"></div><div><div class="score-label">Sınıflandırma</div><div class="badge" style="background:#f0f0f0;color:#999">Yanıt bekleniyor</div></div>`;
  }
  h+=`</div><div class="tag-counts">${["RTB","Grow","Transform"].map(k=>`<div class="tag-count"><div class="num" style="color:${TC[k]}">${tags[k]}</div><div class="lbl">${k}</div></div>`).join("")}</div></div>`;

  // Matrix
  const axes=computeAxes();const hasData=axes.x!==null||axes.y!==null;
  const xN=axes.x!==null?((axes.x-1)/4):0.15,yN=axes.y!==null?((axes.y-1)/4):0.15;
  const dotColor=res?clsColors[res.cls.cls]||"#999":"#999";
  h+=`<div class="matrix-outer"><div style="position:relative"><div class="y-label">İnovasyon derinliği (S1, S4, S7) →</div><div class="matrix-wrap">${matrixZones()}${matrixGrid()}`;
  if(hasData){
    const lL=xN>0.75?`calc(${xN*100}% - 140px)`:`calc(${xN*100}% + 16px)`;
    h+=`<div class="crosshair-h" style="top:${(1-yN)*100}%"></div><div class="crosshair-v" style="left:${xN*100}%"></div>
      <div class="dot" style="left:calc(${xN*100}% - 10px);top:calc(${(1-yN)*100}% - 10px);background:${dotColor}"></div>
      <div class="dot-label" style="left:${lL};top:calc(${(1-yN)*100}% - 12px)">${res?res.cls.label:"..."}</div>`;
  }else{h+=`<div class="empty-hint"><span>Soruları yanıtladıkça proje burada konumlanacak</span></div>`;}
  h+=`</div></div><div class="x-label-row"><span>X: İş modeli değişimi (S2, S3, S6)</span><span>Y: İnovasyon derinliği (S1, S4, S7)</span><span>Koordinat: (${axes.x!==null?axes.x.toFixed(1):"—"}, ${axes.y!==null?axes.y.toFixed(1):"—"})</span></div></div>`;

  // Warnings
  if(res&&res.answered>=5){const tot=tags.RTB+tags.Grow+tags.Transform;if(tot>0&&Math.abs(res.rawScore-res.adjScore)>0.01){const gP=tags.Grow/tot,rP=tags.RTB/tot;const dom=gP>=0.65?"Grow":rP>=0.65?"RTB":"";if(dom)h+=`<div class="warn-box" style="background:#FFF8F0;border-color:#C55A11;color:#C55A11"><strong>Düzeltme:</strong> Ham skor ${res.rawScore.toFixed(2)}, cevapların %${Math.round((dom==="Grow"?gP:rP)*100)}'${dom==="Grow"?"i":"ü"} ${dom} yönelimli → ${res.adjScore.toFixed(2)}</div>`;}}
  if(res&&res.answered>=9)h+=`<div class="result-desc" style="background:${clsBg[res.cls.cls]||"#f0f0f0"};color:${clsColors[res.cls.cls]||"#999"}">${{
    "RTB-1":"Günlük operasyonel bakım. Doğrudan portföye alınır.",
    "RTB-2":"Tek birimi etkileyen orta ölçekli iyileştirme. Doğrudan portföye alınır.",
    "RTB-3":"Çoklu birim etkisi. G3 mini fizibilite gerekir.",
    "CTB-Grow":"Mevcut pazarda büyüme. Agile/Scrum, proje bazlı bütçeleme. G3 fizibilite şart.",
    "CTB-Transform":"Stratejik dönüşüm. Keşif → MVP → Ölçekleme, stage-gate fonlama, kill criteria. G3 zorunlu."
  }[res.cls.cls]||""}</div>`;

  // Progress
  const ans=res?res.answered:0,tot2=res?res.total:9;
  h+=`<div class="progress-bar"><div class="progress-fill" style="width:${(ans/tot2)*100}%;background:#2E75B6"></div></div><div class="progress-text">${ans}/${tot2} soru yanıtlandı</div>`;

  // Save bar
  const canSave=res&&res.answered>=9;
  h+=`<div class="save-bar"><input type="text" id="proj-name" placeholder="Proje adını yazın..." ${canSave?"":"disabled"}>
    <button class="save-btn" onclick="saveProject()" ${canSave?"":"disabled"}>Kaydet</button>
    <span class="save-msg" id="save-msg"></span></div>`;
  h+=`</div>`;

  // Questions
  questions.forEach((q,qi)=>{
    const a=answers[q.id];
    h+=`<div class="q-card ${a!==undefined?"answered":""}"><div class="q-header"><div class="q-header-left"><span class="q-num ${a!==undefined?"active":""}">${qi+1}</span><span class="q-dim">${q.dim}</span>${q.w>0?`<span class="q-weight">ağırlık: %${q.w}</span>`:""}</div><span class="q-src">${q.src}</span></div><div class="q-text">${q.q}</div>`;
    q.opts.forEach(opt=>{
      const sel=a===opt.s;const tc=TC[opt.t]||"#999";
      h+=`<button class="opt-btn ${sel?"sel":""}" style="${sel?`border-color:${tc};border-width:2px;background:${(TB[opt.t]||"#f0f0f0")}`:""}" onclick="selectOpt(${q.id},${opt.s})"><span class="radio" style="${sel?`border-color:${tc}`:""}"><span class="rdot" style="background:${tc}"></span></span><span class="opt-label">${opt.l}</span>${opt.t&&opt.t!=="—"?`<span class="opt-tag" style="background:${tc}18;color:${tc}">${opt.t}</span>`:""}</button>`;
    });
    h+=`</div>`;
  });
  if(Object.keys(answers).length>0)h+=`<button class="reset-btn" onclick="resetAll()">Sıfırla</button>`;
  h+=`<div class="footer"><strong>Matris:</strong> Core (alt, RTB) | Adjacent (orta, CTB-Grow) | Transformational (üst, CTB-Transform)<br><strong>Eşikler:</strong> ≤2.0 → RTB-1/2 | 2.01–2.60 → RTB-2/3 | 2.61–3.40 → CTB-Grow | 3.41+ → CTB-Transform</div>`;
  el.innerHTML=h;
}

function selectOpt(qid,score){answers[qid]=score;render();const cards=document.querySelectorAll('.q-card');const idx=questions.findIndex(q=>q.id===qid);if(idx<questions.length-1)setTimeout(()=>cards[idx+1]?.scrollIntoView({behavior:"smooth",block:"center"}),100);}
function resetAll(){Object.keys(answers).forEach(k=>delete answers[k]);render();window.scrollTo({top:0,behavior:"smooth"});}

// ============ RENDER PAGE 2 (PORTFOLIO) ============
let pieChart=null;
function renderPortfolio(){
  const el=document.getElementById('page1');
  const P=savedProjects;

  if(!P.length){
    el.innerHTML=`<div class="empty-port"><div style="font-size:40px;margin-bottom:12px;opacity:.3">📊</div><p>Henüz kaydedilmiş proje yok.</p><p style="font-size:12px;margin-top:8px;color:#aaa">İlk sekmede projeleri değerlendirip kaydedin, burada portföy görünümünü göreceksiniz.</p></div>`;
    return;
  }

  // Count classes
  const clsCounts={"RTB-1":0,"RTB-2":0,"RTB-3":0,"CTB-Grow":0,"CTB-Transform":0};
  P.forEach(p=>clsCounts[p.cls]=(clsCounts[p.cls]||0)+1);
  const totalP=P.length;

  let h='';

  // Stats cards
  h+=`<div class="port-stats">
    <div class="stat-card"><div class="num" style="color:#1B3A5C">${totalP}</div><div class="lbl">Toplam proje</div></div>
    <div class="stat-card"><div class="num" style="color:#548235">${clsCounts["RTB-1"]+clsCounts["RTB-2"]+clsCounts["RTB-3"]}</div><div class="lbl">RTB</div></div>
    <div class="stat-card"><div class="num" style="color:#C55A11">${clsCounts["CTB-Grow"]}</div><div class="lbl">CTB-Grow</div></div>
    <div class="stat-card"><div class="num" style="color:#7030A0">${clsCounts["CTB-Transform"]}</div><div class="lbl">CTB-Transform</div></div>
  </div>`;

  // Chart row
  h+=`<div class="chart-row">`;

  // Scatter matrix
  h+=`<div class="chart-col" style="flex:1.5"><h3>Portföy matrisi</h3>
    <div class="matrix-outer"><div style="position:relative"><div class="y-label">İnovasyon derinliği →</div>
    <div class="matrix-wrap" id="scatter-matrix">${matrixZones()}${matrixGrid()}`;

  P.forEach((p,i)=>{
    if(p.x===null||p.y===null)return;
    const xN=(p.x-1)/4,yN=(p.y-1)/4;
    const c=clsColors[p.cls]||"#999";
    h+=`<div class="scatter-dot" style="left:calc(${xN*100}% - 7px);top:calc(${(1-yN)*100}% - 7px);background:${c}" onmouseenter="showTip(event,${i})" onmouseleave="hideTip()"></div>`;
  });
  h+=`<div class="scatter-tooltip" id="scatter-tip"></div>`;
  h+=`</div></div><div class="x-label-row"><span>İş modeli değişimi →</span><span>${totalP} proje</span></div></div></div>`;

  // Pie chart
  h+=`<div class="chart-col"><h3>Sınıf dağılımı</h3><canvas id="pie-chart" style="max-height:300px"></canvas></div>`;
  h+=`</div>`;

  // Project list
  h+=`<div class="proj-list"><h3>Kaydedilmiş projeler (${totalP})</h3>`;
  P.forEach((p,i)=>{
    const c=clsColors[p.cls]||"#999",bg=clsBg[p.cls]||"#f0f0f0";
    h+=`<div class="proj-row">
      <div class="pname">${p.name}</div>
      <div class="pbadge" style="background:${bg};color:${c}">${p.label||p.cls}</div>
      <div class="pscore">skor: ${p.score?.toFixed(2)||"—"}</div>
      <div class="pscore">(${p.x?.toFixed(1)||"—"}, ${p.y?.toFixed(1)||"—"})</div>
      <div class="pscore">${p.date||""}</div>
      <div class="pdel" onclick="deleteProject(${i})" title="Sil">×</div>
    </div>`;
  });
  h+=`</div>`;

  el.innerHTML=h;

  // Pie chart
  const canvas=document.getElementById('pie-chart');
  if(canvas){
    if(pieChart)pieChart.destroy();
    const labels=Object.keys(clsCounts).filter(k=>clsCounts[k]>0);
    const data=labels.map(k=>clsCounts[k]);
    const colors=labels.map(k=>clsColors[k]);
    const pcts=labels.map(k=>`${k}: %${(clsCounts[k]/totalP*100).toFixed(0)}`);
    pieChart=new Chart(canvas,{
      type:'doughnut',
      data:{labels:pcts,datasets:[{data,backgroundColor:colors,borderWidth:2,borderColor:'#fff'}]},
      options:{responsive:true,maintainAspectRatio:true,plugins:{legend:{position:'bottom',labels:{font:{size:12,family:'-apple-system,sans-serif'},padding:12,usePointStyle:true,pointStyleWidth:10}}}}
    });
  }
}

function showTip(e,idx){
  const p=savedProjects[idx];if(!p)return;
  const tip=document.getElementById('scatter-tip');
  const c=clsColors[p.cls]||"#999";
  tip.innerHTML=`<div style="font-weight:600;margin-bottom:4px">${p.name}</div>
    <div style="display:inline-block;padding:1px 6px;border-radius:8px;font-size:10px;font-weight:600;background:${clsBg[p.cls]||"#f0f0f0"};color:${c}">${p.label||p.cls}</div>
    <div style="margin-top:4px;color:#888">Skor: ${p.score?.toFixed(2)||"—"} | Koordinat: (${p.x?.toFixed(1)}, ${p.y?.toFixed(1)})</div>
    <div style="color:#aaa;font-size:11px">${p.date||""}</div>`;
  const matrix=document.getElementById('scatter-matrix');
  const rect=matrix.getBoundingClientRect();
  const mx=e.clientX-rect.left,my=e.clientY-rect.top;
  tip.style.left=(mx+20)+'px';tip.style.top=(my-10)+'px';
  if(mx>rect.width*0.6)tip.style.left=(mx-230)+'px';
  tip.classList.add('vis');
}
function hideTip(){document.getElementById('scatter-tip')?.classList.remove('vis');}

render();
</script>
</body>
</html>
